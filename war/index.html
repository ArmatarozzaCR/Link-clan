<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>War — Armata Rozza</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
  --bg-dark: #0e0000;
  --bg-card: rgba(18,4,4,0.82);
  --border-dim: rgba(255,60,0,0.22);
  --pink: #f0407a;
  --orange: #f5a623;
  --gray-bar: rgba(255,255,255,0.12);
  --green: #00e676;
  --accent-blue: #7c6fff;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  font-family: 'Barlow Condensed', sans-serif;
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("./background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-color: #120000;
  color: var(--text);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 16px 60px;
}

.page-header {
  text-align: center;
  margin-bottom: 28px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-dim);
}

.page-header h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #ff4d1f 0%, #ffd54a 50%, #ff4d1f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 14px rgba(255,80,0,0.45));
}

.page-header .subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

.clan-tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.clan-tab {
  padding: 8px 18px;
  border-radius: 50px;
  background: rgba(0,0,0,0.5);
  border: 1.5px solid var(--border-dim);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.clan-tab:hover {
  border-color: rgba(255,80,0,0.5);
  color: rgba(255,255,255,0.85);
}

.clan-tab.active {
  background: linear-gradient(135deg, rgba(255,30,0,0.25), rgba(255,100,0,0.15));
  border-color: var(--red-1);
  color: #fff;
  box-shadow: 0 0 14px rgba(255,30,0,0.35);
}

.war-panel {
  display: none;
  animation: fadeIn 0.35s ease;
}

.war-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.loading-state {
  text-align: center;
  padding: 60px 20px;
  color: rgba(255,255,255,0.4);
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255,80,0,0.2);
  border-top-color: var(--red-2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  text-align: center;
  padding: 40px 20px;
  color: rgba(255,100,80,0.8);
  font-size: 15px;
  letter-spacing: 1px;
}

.war-day-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(0,0,0,0.45);
  border: 1px solid var(--border-dim);
  border-radius: 18px;
  padding: 16px 20px;
  margin-bottom: 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.war-day-bar::-webkit-scrollbar { display: none; }

.day-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 64px;
  position: relative;
}

.day-step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 20px;
  right: -50%;
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.1);
  z-index: 0;
}

.day-step.completed:not(:last-child)::after {
  background: rgba(255,80,0,0.4);
}

.day-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(30,10,10,0.8);
  position: relative;
  z-index: 1;
  transition: all 0.3s;
}

.day-step.active .day-icon {
  border-color: var(--red-2);
  background: linear-gradient(135deg, rgba(255,40,0,0.35), rgba(255,100,0,0.2));
  box-shadow: 0 0 16px rgba(255,50,0,0.55);
}

.day-step.completed .day-icon {
  border-color: rgba(255,80,0,0.4);
  background: rgba(255,60,0,0.12);
}

.day-step.training .day-icon {
  border-color: var(--gold);
  background: rgba(255,180,0,0.15);
  box-shadow: 0 0 12px rgba(255,180,0,0.35);
}

.day-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.day-step.active .day-label { color: #fff; }
.day-step.training .day-label { color: var(--gold); }

.day-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;
}

.clans-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.clan-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: 14px;
  padding: 14px 16px 10px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: slideIn 0.4s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

.clan-row.highlight {
  border-color: rgba(255,50,0,0.6);
  background: rgba(255,30,0,0.08);
}

.clan-row.highlight::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--red-2), var(--gold));
  border-radius: 3px 0 0 3px;
}

.rank-badge {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
  margin-right: 12px;
}

.rank-1 { background: linear-gradient(135deg,#ffd700,#ffa500); color: #000; }
.rank-2 { background: linear-gradient(135deg,#c0c0c0,#a8a8a8); color: #000; }
.rank-3 { background: linear-gradient(135deg,#cd7f32,#a0522d); color: #fff; }
.rank-other { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

.clan-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  margin-right: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.clan-main {
  flex: 1;
  min-width: 0;
}

.clan-top-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.clan-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
}

.stat-pill svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.progress-track {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: var(--gray-bar);
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  border-radius: 4px;
  position: absolute;
  left: 0; top: 0;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.fill-pink  { background: linear-gradient(90deg, #e0306a, var(--pink)); }
.fill-orange{ background: linear-gradient(90deg, #d4850a, var(--orange)); }

.progress-layered {
  position: relative;
  height: 8px;
}

.clan-right {
  flex-shrink: 0;
  margin-left: 14px;
  text-align: right;
  min-width: 80px;
}

.fame-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.avg-value {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

.clan-stats-section {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: 18px;
  padding: 22px 20px;
  margin-top: 8px;
}

.section-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 18px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
}

.stats-pills-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-card {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stat-card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.stat-card-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.finish-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.finish-card {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.finish-ring {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px;
  font-weight: 700;
  border: 3px solid rgba(255,255,255,0.15);
  position: relative;
}

.finish-ring.projected { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 14px rgba(255,180,0,0.3); }
.finish-ring.best      { border-color: var(--green); color: var(--green); box-shadow: 0 0 14px rgba(0,230,118,0.3); }
.finish-ring.worst     { border-color: #ff6b6b;     color: #ff6b6b;     box-shadow: 0 0 14px rgba(255,80,80,0.3); }

.finish-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  line-height: 1.3;
  text-align: center;
}

.finish-score {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
}

.last-updated {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
  margin-top: 18px;
}

.refresh-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 8px 18px;
  border-radius: 50px;
  background: rgba(255,30,0,0.12);
  border: 1px solid rgba(255,30,0,0.35);
  color: rgba(255,255,255,0.7);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover {
  background: rgba(255,30,0,0.22);
  border-color: rgba(255,50,0,0.6);
  color: #fff;
}

.refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

@media (max-width: 500px) {
  #app { padding: 20px 10px 50px; }
  .page-header h1 { font-size: 28px; }
  .clan-row { padding: 12px 12px 8px; }
  .clan-name { font-size: 15px; }
  .fame-value { font-size: 17px; }
  .finish-cards { gap: 6px; }
  .finish-card { padding: 10px 6px; }
  .finish-ring { width: 44px; height: 44px; font-size: 15px; }
  .finish-score { font-size: 15px; }
  .section-title { font-size: 18px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="page-header">
    <h1>⚔ War Status</h1>
    <div class="subtitle">River Race Live — Armata Rozza Family</div>
  </div>
  <div class="clan-tabs" id="clanTabs"></div>
  <div id="warPanels"></div>
</div>

<script>
const SHEET_ID = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
const PROXY = "https://api.allorigins.win/get?url=";

const SVG_TROPHY = `<svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 0 1-2-2V5a1 1 0 0 1 1-1h2"/><path d="M18 9h2a2 2 0 0 0 2-2V5a1 1 0 0 0-1-1h-2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v8a5 5 0 0 1-10 0z"/></svg>`;
const SVG_SWORD  = `<svg viewBox="0 0 24 24" fill="none" stroke="#ff8c42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>`;
const SVG_SHIELD = `<svg viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
const SVG_REFRESH= `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>`;

const DAY_ICONS = ['🎯','⚔️','⚔️','⚔️','⚔️'];

let clanTags = [];
let clanNames = [];
let activeIdx = 0;
let panelData = {};

async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=setting`;
  try {
    const r = await fetch(url);
    const text = await r.text();
    const rows = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    for (let i = 2; i <= 5; i++) {
      const row = rows[i];
      if (!row) continue;
      const tag = (row[2] || '').replace(/^#/,'').replace(/"/g,'').trim();
      const name = (row[1] || '').replace(/"/g,'').trim();
      if (tag) {
        clanTags.push(tag);
        clanNames.push(name || tag);
      }
    }
  } catch(e) {
    clanTags = [];
  }
}

async function fetchRace(tag) {
  const targetUrl = encodeURIComponent(`https://cwstats.com/clan/${tag}/race`);
  const r = await fetch(PROXY + targetUrl);
  const json = await r.json();
  return json.contents || '';
}

function parseRace(html, myTag) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  const data = {
    clans: [],
    warDay: null,
    currentDay: 0,
    battlesLeft: null,
    duelsLeft: null,
    projected: null,
    projectedScore: null,
    best: null,
    bestScore: null,
    worst: null,
    worstScore: null,
  };

  const allText = doc.body ? doc.body.innerText : html;

  const dayMatch = allText.match(/Day\s*(\d)/i);
  if (dayMatch) data.currentDay = parseInt(dayMatch[1]);

  const trainMatch = /training/i.test(allText);
  if (!data.currentDay && trainMatch) data.warDay = 'Training';
  else if (data.currentDay) data.warDay = `Day ${data.currentDay}`;

  const battleMatch = allText.match(/(\d+)\s*battles?\s*left/i);
  if (battleMatch) data.battlesLeft = parseInt(battleMatch[1]);

  const duelMatch = allText.match(/(\d+)\s*duels?\s*left/i);
  if (duelMatch) data.duelsLeft = parseInt(duelMatch[1]);

  const projMatch = allText.match(/projected\s*finish[\s\S]{0,40}?(\d+(?:st|nd|rd|th))/i);
  if (projMatch) data.projected = projMatch[1];

  const projScoreMatch = allText.match(/projected[\s\S]{0,80}?([\d,]+)\s*(?:fame|points|score)/i);
  if (projScoreMatch) data.projectedScore = projScoreMatch[1].replace(',','');

  const bestMatch = allText.match(/best\s*possible\s*finish[\s\S]{0,40}?(\d+(?:st|nd|rd|th))/i);
  if (bestMatch) data.best = bestMatch[1];

  const bestScoreMatch = allText.match(/best[\s\S]{0,80}?([\d,]+)/i);
  if (bestScoreMatch) data.bestScore = bestScoreMatch[1].replace(',','');

  const worstMatch = allText.match(/worst\s*possible\s*finish[\s\S]{0,40}?(\d+(?:st|nd|rd|th))/i);
  if (worstMatch) data.worst = worstMatch[1];

  const clanRows = doc.querySelectorAll('[class*="clan"],[class*="race"],[class*="row"],[class*="team"]');

  const namePattern = /([A-Z][A-Z0-9 &!_\-']{2,})/g;
  const famePattern = /(\d{3,6})/g;

  const scriptTags = doc.querySelectorAll('script');
  let jsonData = null;
  scriptTags.forEach(s => {
    const t = s.textContent;
    const m = t.match(/window\.__NUXT__\s*=\s*(\{[\s\S]+?\});?\s*<\/script>/);
    if (m) { try { jsonData = JSON.parse(m[1]); } catch(e){} }
    const m2 = t.match(/"clans"\s*:\s*(\[[\s\S]+?\])/);
    if (m2) { try { const arr = JSON.parse(m2[1]); if (arr.length) data.clans = buildClans(arr, myTag); } catch(e){} }
  });

  if (!data.clans.length) {
    data.clans = extractClansFromText(allText, myTag);
  }

  return data;
}

function buildClans(arr, myTag) {
  return arr.map((c, i) => ({
    rank: c.rank || i+1,
    name: c.name || c.clanName || `Clan ${i+1}`,
    tag: (c.tag || '').replace('#',''),
    fame: c.fame || c.points || c.medals || 0,
    maxFame: c.maxFame || 10000,
    repairPoints: c.repairPoints || 0,
    boatPoints: c.boatPoints || 0,
    attacksUsed: c.attacksUsed || c.battlesUsed || 0,
    attacksLeft: c.attacksLeft || c.battlesLeft || 0,
    duelsLeft: c.duelsLeft || 0,
    avgScore: c.averageScore || c.avgScore || null,
    isMe: myTag && (c.tag || '').replace('#','').toUpperCase() === myTag.toUpperCase()
  }));
}

function extractClansFromText(text, myTag) {
  const clans = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const fameRe = /\b(\d{3,6})\b/g;
  const clanNameRe = /^([A-Z][A-Za-z0-9 &!_'\-]{2,30})$/;

  let i = 0;
  let rank = 1;
  while (i < lines.length && clans.length < 5) {
    const line = lines[i];
    if (clanNameRe.test(line) && line === line.toUpperCase() && line.length > 3) {
      const fames = [];
      for (let j = i+1; j < Math.min(i+6, lines.length); j++) {
        const m = lines[j].match(/\b(\d{3,6})\b/);
        if (m) fames.push(parseInt(m[1]));
      }
      const fame = fames.length ? Math.max(...fames) : 0;
      clans.push({ rank: rank++, name: line, tag: '', fame, maxFame: 10000, repairPoints: 0, boatPoints: 0, attacksUsed: 0, attacksLeft: 0, duelsLeft: 0, avgScore: null, isMe: false });
    }
    i++;
  }
  return clans;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function renderDayBar(currentDay) {
  const days = [
    {label:'Training', sub:'Day 1-3', icon:'🎯', type:'training'},
    {label:'Day 1', sub:'', icon:'⚔', type:'battle'},
    {label:'Day 2', sub:'', icon:'⚔', type:'battle'},
    {label:'Day 3', sub:'', icon:'⚔', type:'battle'},
    {label:'Day 4', sub:'', icon:'⚔', type:'battle'},
  ];
  const activeIdx = currentDay === 0 ? 0 : currentDay;
  return `<div class="war-day-bar">${days.map((d,i) => {
    let cls = d.type === 'training' ? 'training' : '';
    if (i === activeIdx) cls += ' active';
    else if (i < activeIdx) cls += ' completed';
    return `<div class="day-step ${cls}"><div class="day-icon">${d.icon}</div><div class="day-label">${d.label}</div>${d.sub ? `<div class="day-sub">${d.sub}</div>` : ''}</div>`;
  }).join('')}</div>`;
}

function renderClanRow(clan, idx) {
  const rankClass = clan.rank === 1 ? 'rank-1' : clan.rank === 2 ? 'rank-2' : clan.rank === 3 ? 'rank-3' : 'rank-other';
  const highlight = clan.isMe ? 'highlight' : '';
  const maxFame = 10000;
  const totalFame = (clan.fame || 0) + (clan.repairPoints || 0);
  const famePct = Math.min(100, (clan.fame / maxFame) * 100);
  const repairPct = Math.min(100 - famePct, ((clan.repairPoints||0) / maxFame) * 100);
  const delay = idx * 80;

  return `
  <div class="clan-row ${highlight}" style="animation-delay:${delay}ms">
    <div class="rank-badge ${rankClass}">${clan.rank}</div>
    <div class="clan-icon">🏰</div>
    <div class="clan-main">
      <div class="clan-top-row">
        <div class="clan-name">${escHtml(clan.name)}</div>
        <div class="stat-pill">${SVG_TROPHY}<span>${(clan.fame||0).toLocaleString('it-IT')}</span></div>
        <div class="stat-pill">${SVG_SWORD}<span>${clan.attacksLeft != null ? clan.attacksLeft : 0}</span></div>
        <div class="stat-pill">${SVG_SHIELD}<span>${clan.duelsLeft != null ? clan.duelsLeft : 0}</span></div>
      </div>
      <div class="progress-layered">
        <div class="progress-track">
          <div class="progress-fill fill-pink"  style="width:${famePct}%"></div>
          <div class="progress-fill fill-orange" style="width:${famePct+repairPct}%; opacity:0.7"></div>
        </div>
      </div>
    </div>
    <div class="clan-right">
      <div class="fame-value">${(totalFame).toLocaleString('it-IT')}</div>
      ${clan.avgScore != null ? `<div class="avg-value">${parseFloat(clan.avgScore).toFixed(2)}</div>` : ''}
    </div>
  </div>`;
}

function renderStats(data) {
  const proj = data.projected || '?';
  const best = data.best || '?';
  const worst = data.worst || '?';
  const projScore = data.projectedScore || '—';
  const bestScore = data.bestScore || '—';
  const worstScore = data.worstScore || '—';
  return `
  <div class="clan-stats-section">
    <div class="section-title">Clan Stats</div>
    <div class="stats-pills-row">
      <div class="stat-card">
        <div class="stat-card-label">Battles Left</div>
        <div class="stat-card-value">${data.battlesLeft != null ? data.battlesLeft : '—'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Duels Left</div>
        <div class="stat-card-value">${data.duelsLeft != null ? data.duelsLeft : '—'}</div>
      </div>
    </div>
    <div class="finish-cards">
      <div class="finish-card">
        <div class="finish-ring projected">${proj}</div>
        <div class="finish-label">Projected<br>Finish</div>
        <div class="finish-score">${Number(projScore).toLocaleString('it-IT')}</div>
      </div>
      <div class="finish-card">
        <div class="finish-ring best">${best}</div>
        <div class="finish-label">Best<br>Possible</div>
        <div class="finish-score">${Number(bestScore).toLocaleString('it-IT')}</div>
      </div>
      <div class="finish-card">
        <div class="finish-ring worst">${worst}</div>
        <div class="finish-label">Worst<br>Possible</div>
        <div class="finish-score">${Number(worstScore).toLocaleString('it-IT')}</div>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLoading(panelEl) {
  panelEl.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>Caricamento dati in corso...</div>`;
}

function setError(panelEl, msg) {
  panelEl.innerHTML = `<div class="error-state">⚠ ${escHtml(msg)}</div>`;
}

async function loadPanel(idx) {
  const tag = clanTags[idx];
  const panelEl = document.getElementById(`panel-${idx}`);
  if (!panelEl) return;

  if (panelData[idx]) {
    renderPanel(panelEl, panelData[idx], idx);
    return;
  }

  setLoading(panelEl);
  try {
    const html = await fetchRace(tag);
    if (!html || html.length < 200) throw new Error('Dati non disponibili da CWStats.');
    const data = parseRace(html, tag);
    data.fetchedAt = new Date().toLocaleTimeString('it-IT');
    panelData[idx] = data;
    renderPanel(panelEl, data, idx);
  } catch(e) {
    setError(panelEl, 'Impossibile caricare i dati. Riprova tra qualche secondo.');
    panelEl.innerHTML += `<div style="text-align:center;margin-top:12px"><button class="refresh-btn" onclick="reloadPanel(${idx})">${SVG_REFRESH} Riprova</button></div>`;
  }
}

function renderPanel(panelEl, data, idx) {
  const clanRows = (data.clans || []).map((c,i) => renderClanRow(c, i)).join('');
  const dayBar = renderDayBar(data.currentDay || 0);
  const statsHtml = renderStats(data);
  const time = data.fetchedAt || '';

  panelEl.innerHTML = `
    ${dayBar}
    <div class="clans-list">${clanRows || '<div class="error-state">Nessun dato sui clan disponibile.</div>'}</div>
    ${statsHtml}
    <div class="last-updated">
      ${time ? `Aggiornato alle ${time}` : ''}
      <br>
      <button class="refresh-btn" onclick="reloadPanel(${idx})">${SVG_REFRESH} Aggiorna</button>
    </div>
  `;
}

async function reloadPanel(idx) {
  const panelEl = document.getElementById(`panel-${idx}`);
  if (!panelEl) return;
  delete panelData[idx];
  setLoading(panelEl);
  const btn = panelEl.querySelector('.refresh-btn');
  if (btn) btn.classList.add('spinning');
  await loadPanel(idx);
}

function switchTab(idx) {
  activeIdx = idx;
  document.querySelectorAll('.clan-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.war-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  loadPanel(idx);
}

async function init() {
  await fetchSheet();

  if (!clanTags.length) {
    document.getElementById('app').innerHTML += `<div class="error-state">Nessun tag trovato nel foglio Google. Controlla la colonna C righe 3-6 del foglio "setting".</div>`;
    return;
  }

  const tabsEl = document.getElementById('clanTabs');
  const panelsEl = document.getElementById('warPanels');

  clanTags.forEach((tag, i) => {
    const tab = document.createElement('button');
    tab.className = 'clan-tab' + (i===0 ? ' active' : '');
    tab.textContent = clanNames[i] || tag;
    tab.onclick = () => switchTab(i);
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'war-panel' + (i===0 ? ' active' : '');
    panel.id = `panel-${i}`;
    panelsEl.appendChild(panel);
  });

  loadPanel(0);
}

init();
</script>
</body>
</html>
