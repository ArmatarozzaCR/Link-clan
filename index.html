<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Link - Armata Rozza</title>
<style>
html, body {
  margin: 0;
  padding: 0;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.72)),
    url("background.jpg") no-repeat center top;
  background-size: cover;
  background-attachment: scroll;
  color: #ffffff;
  text-align: center;
  padding: 28px 16px 40px;
  box-sizing: border-box;
}
.button {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 22px;
  width: 100%;
  max-width: 400px;
  margin: 16px auto;
  padding: 18px 20px;
  background: linear-gradient(135deg, rgba(26,26,26,0.92), rgba(45,10,10,0.88));
  border: 2px solid #ff1a1a;
  border-radius: 18px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  transition: all 0.28s ease;
  box-shadow: 0 0 14px rgba(255,0,0,0.45), inset 0 0 10px rgba(255,255,255,0.03);
  box-sizing: border-box;
  animation: glowPulse 3s infinite alternate ease-in-out;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.button:hover {
  background: linear-gradient(135deg, rgba(55,10,10,0.95), rgba(80,0,0,0.92));
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 0 22px rgba(255,0,0,0.72), inset 0 0 12px rgba(255,255,255,0.05);
  animation-play-state: paused;
}
.button span {
  font-size: 22px;
  flex-grow: 1;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
.button img {
  width: 74px !important;
  height: 74px !important;
  object-fit: cover;
  border-radius: 50%;
  border: 2px solid rgba(255, 40, 40, 0.95);
  box-shadow: 0 0 10px rgba(255,0,0,0.45);
  flex-shrink: 0;
}
@keyframes glowPulse {
  0% { box-shadow: 0 0 8px rgba(255, 0, 0, 0.45), inset 0 0 8px rgba(255,255,255,0.02); }
  50% { box-shadow: 0 0 20px rgba(255, 70, 0, 0.95), inset 0 0 10px rgba(255,255,255,0.04); }
  100% { box-shadow: 0 0 8px rgba(255, 0, 0, 0.45), inset 0 0 8px rgba(255,255,255,0.02); }
}
#mobileContent {
  width: 100%;
  max-width: 430px;
}
.main-panel {
  width: 100%;
  margin: 132px auto 0;
  padding: 18px 14px 22px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.58));
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  box-sizing: border-box;
}
#verificaContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto 24px auto;
}
#verificaInput {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 2px solid #ff1a1a;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  box-sizing: border-box;
  background: rgba(255,255,255,0.92);
  color: #111;
  outline: none;
  box-shadow: 0 0 14px rgba(255,0,0,0.18);
}
#verificaInput::placeholder {
  color: #666;
  font-weight: 600;
}
#verificaInput:focus {
  border-color: #ff4d4d;
  box-shadow: 0 0 18px rgba(255,0,0,0.35);
}
#verificaBtn {
  width: 100%;
  justify-content: center;
  gap: 0;
}
#verificaBtn span {
  text-align: center;
}
#verificaRisultato {
  margin-top: 14px;
  font-size: 17px;
  line-height: 1.45;
  color: #ffd54a;
  text-align: center;
  text-shadow: 0 1px 2px rgba(0,0,0,0.75);
  padding: 0 6px;
}
#linkContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}
@media (max-width: 420px) {
  body {
    padding: 22px 12px 32px;
  }
  .main-panel {
    margin-top: 118px;
    padding: 16px 10px 18px;
  }
  .button {
    gap: 18px;
    padding: 16px;
    border-radius: 16px;
  }
  .button span {
    font-size: 19px;
  }
  .button img {
    width: 66px !important;
    height: 66px !important;
  }
  #verificaInput {
    font-size: 17px;
  }
}
</style>
<script>
const SHEET_ID = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
const CLAN_SHEETS = ["Armata Rozza", "I Tori Feroci", "Dog Rider", "Warlosing"];

async function caricaLink() {
  try {
    const res = await fetch("https://nameless-brook-094f.cr-armatarozza.workers.dev/", { headers: { referer: location.origin } });
    if(!res.ok) {
      if (res.status === 403) {
        document.body.innerHTML = `<div style=\"font-size: 22px; line-height: 1.5; padding: 20px; box-sizing: border-box; color: white; background: black;\">⛔ Il sito è offline,<br>vi è andata male Russi 🇷🇺</div>`;
        return;
      }
      throw new Error();
    }
    const data = await res.json();
    const container = document.getElementById("linkContainer");
    for (const item of data) {
      const div = document.createElement("div");
      div.className = "button";
      div.onclick = async () => {
        try {
          const tokenRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}`, { headers: { referer: location.origin } });
          if(!tokenRes.ok) throw new Error();
          const tokenData = await tokenRes.json();
          if(!tokenData.token) return alert("Token non ricevuto");
          const urlRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}&token=${tokenData.token}`, { headers: { referer: location.origin } });
          if(!urlRes.ok) {
            const text = await urlRes.text();
            return alert("Errore apertura link: " + text);
          }
          const urlData = await urlRes.json();
          if(urlData.url) {
            window.location.href = urlData.url;
          } else {
            alert("Link non disponibile");
          }
        } catch {
          alert("Errore apertura link");
        }
      };
      const img = document.createElement("img");
      img.src = item.img;
      img.alt = item.nome;
      img.style = "width: 75px; height: 75px; object-fit: cover;";
      const span = document.createElement("span");
      span.textContent = item.nome;
      div.appendChild(img);
      div.appendChild(span);
      container.appendChild(div);
    }
    document.getElementById("mobileContent").style.display = 'block';
  } catch {
    document.body.innerHTML = "<div style='padding:20px;font-size:20px;'>Errore nel caricamento dei link.</div>";
  }
}

async function leggiFoglio(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Errore lettura foglio ${sheetName}`);

  const text = await res.text();
  const jsonText = text
    .replace(/^\/\*O_o\*\/\s*/, "")
    .replace(/^google\.visualization\.Query\.setResponse\(/, "")
    .replace(/\);$/, "");

  const data = JSON.parse(jsonText);
  return data.table.rows || [];
}

async function convocazioniAttive() {
  try {
    const rows = await leggiFoglio("setting");
    if (!rows.length) return true;

    const primaRiga = rows[0].c || [];
    const chiave = String((primaRiga[0] && primaRiga[0].v) || "").trim().toLowerCase();
    const valore = String((primaRiga[1] && primaRiga[1].v) || "").trim().toLowerCase();

    if (chiave !== "convocazioni") return true;
    return valore === "on";
  } catch {
    return true;
  }
}

async function verificaConvocazione() {
  const attive = await convocazioniAttive();

  if (!attive) {
    document.getElementById("verificaRisultato").innerHTML = "Convocazioni attualmente disattivate";
    return;
  }

  let tag = document.getElementById("verificaInput").value.trim();
  if (!tag) return;
  
  tag = tag.replace(/^@+/, "").toUpperCase();
  localStorage.setItem("ultimoTag", tag);

  try {
    document.getElementById("verificaRisultato").innerHTML = "Controllo in corso...";

    let risultati = [];

    for (const sheetName of CLAN_SHEETS) {
      const rows = await leggiFoglio(sheetName);

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const cells = row.c || [];

        let nome = String((cells[0] && cells[0].v) || "").trim();
        let tagCell = String((cells[1] && cells[1].v) || "").replace(/^@+/, "").toUpperCase().trim();

        if (tagCell && tagCell === tag) {
          risultati.push(`Sei convocato in ${sheetName} con l'account ${nome}`);
        }
      }
    }
    
    const output = risultati.length 
      ? risultati.join("<br>") 
      : `Tag \"${tag}\" non trovato nelle convocazioni`;
    
    document.getElementById("verificaRisultato").innerHTML = output;

  } catch (e) {
    console.error("Errore:", e);
    document.getElementById("verificaRisultato").innerHTML = "Errore caricamento dati";
  }
}

window.onload = function () {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (!isMobile) {
    document.body.innerHTML = `<div style=\"font-size: 22px; line-height: 1.5; padding: 20px; box-sizing: border-box; color: white; background: black;\">⚠️ Questo sito può essere aperto solo da dispositivi mobili con installato Clash Royale.<br>Per favore aprilo sul tuo smartphone o tablet.</div>`;
    return;
  }

  const mobileContent = document.getElementById("mobileContent");
  const verificaDiv = document.createElement("div");
  verificaDiv.id = "verificaContainer";

  const input = document.createElement("input");
  input.id = "verificaInput";
  input.placeholder = "Inserisci il tuo tag Telegram";
  verificaDiv.appendChild(input);
  
  setTimeout(() => {
    const ultimoTag = localStorage.getItem("ultimoTag");
    if (ultimoTag) {
      input.value = ultimoTag;
    }
  }, 0);
  
  const btn = document.createElement("div");
  btn.className = "button";
  btn.id = "verificaBtn";
  btn.textContent = "Verifica convocazione";
  btn.onclick = verificaConvocazione;
  verificaDiv.appendChild(btn);

  const output = document.createElement("div");
  output.id = "verificaRisultato";
  verificaDiv.appendChild(output);

  mobileContent.insertBefore(verificaDiv, document.getElementById("linkContainer"));

  caricaLink();
};

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (
    e.keyCode === 123 ||
    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
    (e.ctrlKey && e.keyCode === 85) ||
    (e.ctrlKey && e.keyCode === 83)
  ) {
    e.preventDefault();
    return false;
  }
});
</script>
</head>
<body>
<div id="mobileContent" style="display:none;">
  <div class="main-panel">
    <div id="linkContainer"></div>
  </div>
</div>
</body>
</html>
