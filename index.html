<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Link - Armata Rozza</title>
<style>
html, body {
  margin: 0;
  padding: 0;
}

:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
  --panel-dark: rgba(28, 8, 8, 0.74);
  --panel-dark-2: rgba(70, 10, 10, 0.48);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("./background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-color: #120000;
  color: var(--text);
  text-align: center;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  opacity: .9;
}

#mobileContent {
  position: relative;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  padding: 240px 14px 34px;
}

#mobileContent::before {
  content: "";
  position: absolute;
  top: 183px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 22px);
  max-width: 406px;
  height: calc(100% - 200px);
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.25));
  box-shadow:
    0 12px 30px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.04);
  z-index: 0;
}

#dynamicTop,
#linkContainer {
  position: relative;
  z-index: 1;
}

#verificaContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto 22px auto;
}

#verificaInput {
  width: 100%;
  padding: 15px 18px;
  border-radius: 18px;
  border: 2px solid rgba(255, 55, 35, 0.95);
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 14px;
  background:
    linear-gradient(180deg, rgba(45, 0, 0, 0.88), rgba(20, 0, 0, 0.84));
  color: #fff;
  outline: none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 0 12px rgba(255,0,0,0.25),
    0 6px 18px rgba(0,0,0,0.22);
  transition: .25s ease;
}

#verificaInput::placeholder {
  color: rgba(255,255,255,0.72);
  font-weight: 600;
}

#verificaInput:focus {
  border-color: #ff6a4f;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08) inset,
    0 0 22px rgba(255,40,0,0.42),
    0 8px 20px rgba(0,0,0,0.24);
  transform: translateY(-1px);
}

.button {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 20px;
  width: 100%;
  max-width: 400px;
  margin: 16px auto;
  padding: 17px 18px;
  background:
    linear-gradient(135deg, rgba(25,25,25,0.93), rgba(65,8,8,0.88) 58%, rgba(95,15,15,0.78));
  border: 2px solid var(--red-1);
  border-radius: 20px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 800;
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease;
  box-shadow:
    0 0 10px rgba(255, 20, 0, 0.40),
    0 0 24px rgba(255, 60, 0, 0.12),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  animation: glowPulse 3.2s infinite alternate ease-in-out;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  overflow: hidden;
}

.button::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.09) 18%, transparent 36%);
  transform: translateX(-130%);
  transition: transform .65s ease;
  pointer-events: none;
}

.button::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 18px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 24%, transparent 76%, rgba(0,0,0,0.10));
}

.button:hover::before {
  transform: translateX(130%);
}

.button:hover {
  background:
    linear-gradient(135deg, rgba(42,10,10,0.98), rgba(90,8,8,0.92) 58%, rgba(120,15,15,0.84));
  transform: translateY(-2px) scale(1.008);
  box-shadow:
    0 0 18px rgba(255, 30, 0, 0.62),
    0 0 34px rgba(255, 80, 0, 0.18),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  border-color: #ff5a3a;
  animation-play-state: paused;
}

.button:active {
  transform: scale(0.985);
}

.button span {
  font-size: 20px;
  flex-grow: 1;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.2px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
  position: relative;
  z-index: 1;
}

.button img {
  width: 75px;
  height: 75px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(255,0,0,0.4));
}

#verificaBtn {
  justify-content: center;
  text-align: center;
  min-height: 58px;
}

#verificaBtn span {
  text-align: center;
}

#verificaRisultato {
  margin-top: 14px;
  font-size: 17px;
  color: var(--gold);
  text-align: center;
  line-height: 1.5;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.72),
    0 0 8px rgba(255,170,0,0.14);
  padding: 2px 8px 0;
  font-weight: 600;
  word-break: break-word;
}

#linkContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}

@keyframes glowPulse {
  0% {
    box-shadow:
      0 0 8px rgba(255, 0, 0, 0.45),
      0 0 18px rgba(255, 70, 0, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  50% {
    box-shadow:
      0 0 20px rgba(255, 60, 0, 0.80),
      0 0 38px rgba(255, 110, 0, 0.20),
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255, 0, 0, 0.45),
      0 0 18px rgba(255, 70, 0, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
}

@media (max-width: 420px) {
  #mobileContent {
    padding: 220px 12px 28px;
  }

  #mobileContent::before {
    width: calc(100% - 18px);
  }

  .button {
    gap: 16px;
    padding: 15px 16px;
    border-radius: 18px;
  }

  .button::after {
    border-radius: 16px;
  }

  .button span {
    font-size: 18px;
  }

  .button img {
    width: 68px !important;
    height: 68px !important;
  }

  #verificaInput {
    font-size: 17px;
    padding: 14px 16px;
  }

  #verificaRisultato {
    font-size: 16px;
  }
}
</style>
<script>
const SHEET_ID = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
const CLAN_SHEETS = ["Armata Rozza", "I Tori Feroci", "Dog Rider", "Warlosing"];

async function caricaLink() {
  try {
    const res = await fetch("https://nameless-brook-094f.cr-armatarozza.workers.dev/", { headers: { referer: location.origin } });
    if(!res.ok) {
      if (res.status === 403) {
        document.body.innerHTML = `<div style="font-size:22px; line-height:1.5; padding:20px; box-sizing:border-box; color:white; background:black;">⛔ Il sito è offline,<br>vi è andata male Russi 🇷🇺</div>`;
        return;
      }
      throw new Error();
    }

    const data = await res.json();
    const container = document.getElementById("linkContainer");

    for (const item of data) {
      const div = document.createElement("div");
      div.className = "button";
      div.onclick = async () => {
        try {
          const tokenRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}`, { headers: { referer: location.origin } });
          if(!tokenRes.ok) throw new Error();

          const tokenData = await tokenRes.json();
          if(!tokenData.token) return alert("Token non ricevuto");

          const urlRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}&token=${tokenData.token}`, { headers: { referer: location.origin } });
          if(!urlRes.ok) {
            const text = await urlRes.text();
            return alert("Errore apertura link: " + text);
          }

          const urlData = await urlRes.json();
          if(urlData.url) {
            window.location.href = urlData.url;
          } else {
            alert("Link non disponibile");
          }
        } catch {
          alert("Errore apertura link");
        }
      };

      const img = document.createElement("img");
      img.src = item.img;
      img.alt = item.nome;
      img.style = "width:75px;height:75px;object-fit:contain;flex-shrink:0;";

      const span = document.createElement("span");
      span.textContent = item.nome;

      div.appendChild(img);
      div.appendChild(span);
      container.appendChild(div);
    }
  } catch {
    document.body.innerHTML = "<div style='padding:20px;font-size:20px;color:white;'>Errore nel caricamento dei link.</div>";
  }
}

async function leggiFoglio(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Errore lettura foglio ${sheetName}`);

  const text = await res.text();
  const jsonText = text
    .replace(/^\/\*O_o\*\/\s*/, "")
    .replace(/^google\.visualization\.Query\.setResponse\(/, "")
    .replace(/\);$/, "");

  const data = JSON.parse(jsonText);
  return data.table.rows || [];
}

async function convocazioniAttive() {
  try {
    const rows = await leggiFoglio("setting");
    if (!rows.length) return true;

    const primaRiga = rows[0].c || [];
    const chiave = String((primaRiga[0] && primaRiga[0].v) || "").trim().toLowerCase();
    const valore = String((primaRiga[1] && primaRiga[1].v) || "").trim().toLowerCase();

    if (chiave !== "convocazioni") return true;
    return valore === "on";
  } catch {
    return true;
  }
}

async function verificaConvocazione() {
  const attive = await convocazioniAttive();

  if (!attive) {
    document.getElementById("verificaRisultato").innerHTML = "Convocazioni attualmente disattivate";
    return;
  }

  let tag = document.getElementById("verificaInput").value.trim();
  if (!tag) return;

  tag = tag.replace(/^@+/, "").toUpperCase();
  localStorage.setItem("ultimoTag", tag);

  try {
    document.getElementById("verificaRisultato").innerHTML = "Controllo in corso...";

    let risultati = [];

    for (const sheetName of CLAN_SHEETS) {
      const rows = await leggiFoglio(sheetName);

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const cells = row.c || [];

        let nome = String((cells[0] && cells[0].v) || "").trim();
        let tagCell = String((cells[1] && cells[1].v) || "").replace(/^@+/, "").toUpperCase().trim();

        if (tagCell && tagCell === tag) {
          risultati.push(`Sei convocato in ${sheetName} con l'account ${nome}`);
        }
      }
    }

    const output = risultati.length
      ? risultati.join("<br>")
      : `Tag "${tag}" non trovato nelle convocazioni`;

    document.getElementById("verificaRisultato").innerHTML = output;
  } catch (e) {
    console.error("Errore:", e);
    document.getElementById("verificaRisultato").innerHTML = "Errore caricamento dati";
  }
}

window.onload = function () {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (!isMobile) {
    document.body.innerHTML = `<div style="font-size:22px; line-height:1.5; padding:20px; box-sizing:border-box; color:white; background:black;">⚠️ Questo sito può essere aperto solo da dispositivi mobili con installato Clash Royale.<br>Per favore aprilo sul tuo smartphone o tablet.</div>`;
    return;
  }

  const container = document.getElementById("dynamicTop");
  const verificaDiv = document.createElement("div");
  verificaDiv.id = "verificaContainer";

  const input = document.createElement("input");
  input.id = "verificaInput";
  input.placeholder = "Inserisci il tuo tag Telegram";
  verificaDiv.appendChild(input);

  setTimeout(() => {
    const ultimoTag = localStorage.getItem("ultimoTag");
    if (ultimoTag) {
      input.value = ultimoTag;
    }
  }, 0);

  const btn = document.createElement("div");
  btn.className = "button";
  btn.id = "verificaBtn";
  btn.textContent = "Verifica convocazione";
  btn.onclick = verificaConvocazione;
  verificaDiv.appendChild(btn);

  const output = document.createElement("div");
  output.id = "verificaRisultato";
  verificaDiv.appendChild(output);

  container.appendChild(verificaDiv);

  caricaLink();
};

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (
    e.keyCode === 123 ||
    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
    (e.ctrlKey && e.keyCode === 85) ||
    (e.ctrlKey && e.keyCode === 83)
  ) {
    e.preventDefault();
    return false;
  }
});
</script>
</head>
<body>
  <div id="mobileContent">
    <div id="dynamicTop"></div>
    <div id="linkContainer"></div>
  </div>
</body>
</html>
