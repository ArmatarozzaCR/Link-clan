<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>War — Armata Rozza</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
  --bg-card: rgba(18,4,4,0.82);
  --border-dim: rgba(255,60,0,0.22);
  --pink: #f0407a;
  --orange: #f5a623;
  --gray-bar: rgba(255,255,255,0.12);
  --green: #00e676;
  --blue: #7c6fff;
}

*, *::before, *::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  margin: 0;
  padding: 0;
}

html, body {
  min-height: 100vh;
  font-family: 'Barlow Condensed', sans-serif;
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("./background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-color: #120000;
  color: var(--text);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  z-index: 0;
  opacity: .9;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 28px 14px 64px;
}

.page-header {
  text-align: center;
  margin-bottom: 24px;
}

.page-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #ff4d1f 0%, #ffd54a 50%, #ff4d1f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 14px rgba(255,80,0,0.40));
}

.page-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.48);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 3px;
}

.top-shell {
  position: relative;
  width: 100%;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(0,0,0,0.16), rgba(0,0,0,0.25));
  border: 1px solid rgba(255,70,0,0.16);
  box-shadow:
    0 12px 30px rgba(0,0,0,0.24),
    inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 16px 12px 18px;
}

.clan-tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.clan-tab {
  padding: 9px 18px;
  border-radius: 50px;
  background: rgba(0,0,0,0.52);
  border: 1.5px solid var(--border-dim);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.56);
  cursor: pointer;
  transition: all 0.22s ease;
  user-select: none;
}

.clan-tab:hover {
  border-color: rgba(255,80,0,0.50);
  color: rgba(255,255,255,0.90);
}

.clan-tab.active {
  background: linear-gradient(135deg, rgba(255,30,0,0.24), rgba(255,100,0,0.14));
  border-color: var(--red-1);
  color: #fff;
  box-shadow: 0 0 14px rgba(255,30,0,0.30);
}

.war-panel {
  display: none;
  animation: fadeIn 0.35s ease;
}

.war-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading-state, .error-state {
  text-align: center;
  padding: 48px 18px;
}

.loading-state {
  color: rgba(255,255,255,0.44);
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.error-state {
  color: rgba(255,120,100,0.86);
  font-size: 15px;
  letter-spacing: 1px;
}

.loading-spinner {
  width: 38px;
  height: 38px;
  border: 3px solid rgba(255,80,0,0.18);
  border-top-color: var(--red-2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hero-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: 18px;
  padding: 18px 16px;
  margin-bottom: 18px;
  overflow: hidden;
  position: relative;
}

.hero-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.04) 18%, transparent 36%);
  transform: translateX(-130%);
  animation: shimmer 6s linear infinite;
  pointer-events: none;
}

@keyframes shimmer {
  to { transform: translateX(130%); }
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 14px;
}

.hero-box {
  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 14px 14px;
  min-height: 84px;
}

.hero-box-label {

  font-weight: 700;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.40);

}

.hero-main {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

.hero-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.54);
  margin-top: 4px;
}

.hero-day {
  color: var(--gold);
  text-shadow: 0 0 12px rgba(255,210,40,0.24);
}

.day-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(0,0,0,0.36);
  border: 1px solid var(--border-dim);
  border-radius: 18px;
  padding: 14px 16px;
  margin-bottom: 18px;
  overflow-x: auto;
  scrollbar-width: none;
}

.day-bar::-webkit-scrollbar {
  display: none;
}

.day-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 66px;
  position: relative;
}

.day-step:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 19px;
  right: -50%;
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.10);
  z-index: 0;
}

.day-step.completed:not(:last-child)::after {
  background: rgba(255,80,0,0.35);
}

.day-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.10);
  background: rgba(28,10,10,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  position: relative;
  z-index: 1;

}

.day-step.active .day-icon {
  border-color: var(--red-2);
  background: linear-gradient(135deg, rgba(255,40,0,0.34), rgba(255,100,0,0.18));

}

.day-step.completed .day-icon {
  border-color: rgba(255,80,0,0.34);

}

.day-step.training .day-icon {
  border-color: var(--gold);
  background: rgba(255,180,0,0.14);
  box-shadow: 0 0 12px rgba(255,180,0,0.28);
}

.day-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.50);
  text-align: center;
}

.day-step.active .day-label { color: #fff; }
.day-step.training .day-label { color: var(--gold); }

.day-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  text-align: center;
}

.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: 18px;
  padding: 18px 14px;
  margin-bottom: 18px;
}

.section-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  text-align: center;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  margin-bottom: 16px;
}

.clans-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.clan-row {
  display: flex;
  align-items: center;

@keyframes slideIn {

.clan-row.highlight::before {

.rank-badge {

  border-radius: 9px;

  align-items: center;
  justify-content: center;

  font-weight: 700;

}

.rank-1 { background: linear-gradient(135deg,#ffd700,#ffa500); color: #000; }
.rank-2 { background: linear-gradient(135deg,#c0c0c0,#a8a8a8); color: #000; }
.rank-3 { background: linear-gradient(135deg,#cd7f32,#a0522d); color: #fff; }
.rank-other { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.68); }

.clan-icon {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  flex-shrink: 0;
  margin-right: 12px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.clan-main {
  flex: 1;
  min-width: 0;
}

.clan-top-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.clan-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.4px;
  white-space: nowrap;

}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.86);

}

.stat-pill svg {

.progress-track {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: var(--gray-bar);
  overflow: hidden;

}

.progress-fill {
  height: 100%;

  left: 0;
  top: 0;

.fill-pink  { background: linear-gradient(90deg, #e0306a, var(--pink)); }
.fill-orange{ background: linear-gradient(90deg, #d4850a, var(--orange)); }

.clan-right {
  flex-shrink: 0;
  margin-left: 14px;
  text-align: right;
  min-width: 86px;
}

.fame-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);

}

.avg-value {
  font-size: 13px;
  color: rgba(255,255,255,0.44);
  margin-top: 2px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.stat-card {
  background: rgba(0,0,0,0.32);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;

}

.stat-card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.40);
}

.stat-card-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.finish-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.finish-card {
  background: rgba(0,0,0,0.32);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;

}

.finish-ring {

}

.finish-ring.projected {

}

.finish-ring.best {

  color: var(--green);

}

.finish-ring.worst {

}

.finish-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.36);
  line-height: 1.3;
  min-height: 28px;
}

.finish-score {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.88);
  margin-top: 6px;
}

.last-updated {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
  margin-top: 16px;
}

.refresh-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 8px 18px;
  border-radius: 50px;
  background: rgba(255,30,0,0.12);
  border: 1px solid rgba(255,30,0,0.35);
  color: rgba(255,255,255,0.74);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;

.refresh-btn:hover {

<body>
<div id="app">
  <div class="page-header">
    <div class="page-title">⚔ War Status</div>
    <div class="page-subtitle">River Race Live — Armata Rozza Family</div>
  </div>

  <div class="top-shell">
    <div class="clan-tabs" id="clanTabs"></div>
    <div id="warPanels"></div>
  </div>
</div>

<script>
const SHEET_ID = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
const PROXY = "https://api.allorigins.win/raw?url=";

const SVG_TROPHY = `<svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 0 1-2-2V5a1 1 0 0 1 1-1h2"/><path d="M18 9h2a2 2 0 0 0 2-2V5a1 1 0 0 0-1-1h-2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v8a5 5 0 0 1-10 0z"/></svg>`;
const SVG_SWORD = `<svg viewBox="0 0 24 24" fill="none" stroke="#ff8c42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>`;
const SVG_SHIELD = `<svg viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
const SVG_REFRESH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>`;

const DAY_DEF = [
  { key: "training", label: "Training", sub: "Start", icon: "🎯" },
  { key: "day1", label: "Day 1", sub: "", icon: "⚔️" },
  { key: "day2", label: "Day 2", sub: "", icon: "⚔️" },
  { key: "day3", label: "Day 3", sub: "", icon: "⚔️" },
  { key: "day4", label: "Day 4", sub: "", icon: "⚔️" }
];

let clanEntries = [];
let activeIdx = 0;
let cache = {};

function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function cleanText(v) {
  return String(v ?? "")
    .replace(/\u00a0/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function toInt(v) {
  const n = parseInt(String(v ?? "").replace(/[^\d-]/g, ""), 10);
  return Number.isFinite(n) ? n : null;
}

function fmtNum(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString("it-IT") : "—";
}

function ordinal(n) {
  const num = Number(n);
  if (!Number.isFinite(num)) return "—";
  const j = num % 10;
  const k = num % 100;
  if (j === 1 && k !== 11) return `${num}st`;
  if (j === 2 && k !== 12) return `${num}nd`;
  if (j === 3 && k !== 13) return `${num}rd`;
  return `${num}th`;
}

function parseGviz(text) {
  const jsonText = text
    .replace(/^\/\*O_o\*\/\s*/, "")
    .replace(/^google\.visualization\.Query\.setResponse\(/, "")
    .replace(/\);$/, "");
  return JSON.parse(jsonText);
}

async function fetchSettingRows() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=setting&tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const data = parseGviz(text);
  const rows = data.table.rows || [];
  const out = [];

  for (let i = 2; i <= 5; i++) {
    const cells = rows[i]?.c || [];
    const name = cleanText(cells[0]?.v || "");
    const trophies = toInt(cells[1]?.v || "");
    const tag = cleanText(cells[2]?.v || "").replace(/^#/, "").toUpperCase();
    if (tag) {
      out.push({ name: name || tag, tag, trophies });
    }
  }

  return out;
}

async function fetchRaceHtml(tag) {
  const raceUrl = `https://cwstats.com/clan/${encodeURIComponent(tag)}/race`;
  const res = await fetch(PROXY + encodeURIComponent(raceUrl), { cache: "no-store" });
  if (!res.ok) throw new Error("Impossibile raggiungere CWStats");
  const html = await res.text();
  if (!html || html.length < 200) throw new Error("Sorgente race non disponibile");
  return html;
}

function tryJsonParse(str) {
  try {
    return JSON.parse(str);
  } catch {
    return null;
  }
}

function findObjectsDeep(node, predicate, out = []) {
  if (Array.isArray(node)) {
    if (predicate(node)) out.push(node);
    for (const item of node) findObjectsDeep(item, predicate, out);
    return out;
  }
  if (node && typeof node === "object") {
    if (predicate(node)) out.push(node);
    for (const key of Object.keys(node)) findObjectsDeep(node[key], predicate, out);
  }
  return out;
}

function isClanLikeObject(obj) {
  if (!obj || typeof obj !== "object") return false;
  const keys = Object.keys(obj).map(k => k.toLowerCase());
  const hasName = keys.some(k => ["name", "clanname"].includes(k));
  const hasNumeric = keys.some(k => ["fame","points","score","repairpoints","boatpoints","rank","placement"].includes(k));
  return hasName && hasNumeric;
}

function normalizeClanObject(obj, idx, myTag) {
  const name = cleanText(obj.name || obj.clanName || obj.clan_name || obj.title || `Clan ${idx + 1}`);
  const tag = cleanText(obj.tag || obj.clanTag || obj.clan_tag || "").replace(/^#/, "").toUpperCase();
  const fame = toInt(obj.fame ?? obj.points ?? obj.score ?? obj.clanScore ?? 0) || 0;
  const repairPoints = toInt(obj.repairPoints ?? obj.repair_points ?? obj.boatrepairpoints ?? obj.boatRepairPoints ?? 0) || 0;
  const boatPoints = toInt(obj.boatPoints ?? obj.boat_points ?? 0) || 0;
  const attacksLeft = toInt(obj.attacksLeft ?? obj.battlesLeft ?? obj.remainingBattles ?? obj.remaining_attacks);
  const duelsLeft = toInt(obj.duelsLeft ?? obj.remainingDuels ?? obj.remaining_duels);
  const rank = toInt(obj.rank ?? obj.placement ?? obj.position ?? idx + 1) || (idx + 1);
  const avgScore = Number(obj.averageScore ?? obj.avgScore ?? obj.average_score);
  const isMe = tag && myTag && tag === myTag.toUpperCase();

  return {
    rank,
    name,
    tag,
    fame,
    repairPoints,
    boatPoints,
    attacksLeft,
    duelsLeft,
    avgScore: Number.isFinite(avgScore) ? avgScore : null,
    totalShown: fame + repairPoints,
    isMe
  };
}

function extractClanArraysFromJson(html, myTag) {
  const arrays = [];
  const scriptMatches = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)];

  for (const m of scriptMatches) {
    const content = m[1] || "";

    const nextDataMatch = content.match(/^\s*\{[\s\S]*\}\s*$/);
    if (nextDataMatch) {
      const parsed = tryJsonParse(nextDataMatch[0]);
      if (parsed) {
        const found = findObjectsDeep(parsed, isClanLikeObject);
        if (found.length) arrays.push(...found);
      }
    }

    const nuxtMatch = content.match(/window\.__NUXT__\s*=\s*(\{[\s\S]*?\})\s*;?/);
    if (nuxtMatch) {
      const parsed = tryJsonParse(nuxtMatch[1]);
      if (parsed) {
        const found = findObjectsDeep(parsed, isClanLikeObject);
        if (found.length) arrays.push(...found);
      }
    }

    const genericArrayMatches = [...content.matchAll(/\[[\s\S]{0,3000}?\]/g)];
    for (const arrM of genericArrayMatches) {
      const parsed = tryJsonParse(arrM[0]);
      if (Array.isArray(parsed) && parsed.length && parsed.every(isClanLikeObject)) {
        arrays.push(parsed);
      }
    }
  }

  const best = arrays
    .filter(arr => Array.isArray(arr) && arr.length >= 2 && arr.length <= 8)
    .sort((a, b) => b.length - a.length)[0];

  if (!best) return [];

  return best.map((obj, idx) => normalizeClanObject(obj, idx, myTag));
}

function extractClansFromText(html, myTag) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  const text = cleanText(doc.body?.innerText || html);
  const lines = text.split(/\n+/).map(cleanText).filter(Boolean);

  const candidates = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (
      line.length >= 3 &&
      line.length <= 40 &&
      /[A-Za-z]/.test(line) &&
      !/Day\s*\d|Training|Battles Left|Duels Left|Projected|Best Possible|Worst Possible/i.test(line)
    ) {
      const nearby = lines.slice(i, i + 6).join(" ");
      const nums = [...nearby.matchAll(/\b\d{3,6}\b/g)].map(x => parseInt(x[0], 10));
      if (nums.length) {
        candidates.push({
          rank: candidates.length + 1,
          name: line,
          tag: "",
          fame: nums[0] || 0,
          repairPoints: 0,
          boatPoints: 0,
          attacksLeft: null,
          duelsLeft: null,
          avgScore: null,
          totalShown: nums[0] || 0,
          isMe: false
        });
      }
    }
  }

  const unique = [];
  const seen = new Set();
  for (const c of candidates) {
    const k = c.name.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k);
    unique.push(c);
    if (unique.length >= 5) break;
  }

  return unique;
}

function extractMeta(text) {
  const out = {
    currentDay: 0,
    isTraining: false,
    battlesLeft: null,
    duelsLeft: null,
    projected: null,
    projectedScore: null,
    best: null,
    bestScore: null,
    worst: null,
    worstScore: null
  };

  if (/training/i.test(text)) out.isTraining = true;

  const dayMatch = text.match(/\bDay\s*(\d)\b/i);
  if (dayMatch) out.currentDay = Number(dayMatch[1]) || 0;

  const battlesLeftMatch = text.match(/(\d+)\s*battles?\s*left/i);
  if (battlesLeftMatch) out.battlesLeft = Number(battlesLeftMatch[1]);

  const duelsLeftMatch = text.match(/(\d+)\s*duels?\s*left/i);
  if (duelsLeftMatch) out.duelsLeft = Number(duelsLeftMatch[1]);

  const projectedMatch = text.match(/projected\s*finish[\s\S]{0,50}?(\d+)(?:st|nd|rd|th)?/i);
  if (projectedMatch) out.projected = Number(projectedMatch[1]);

  const projectedScoreMatch = text.match(/projected[\s\S]{0,70}?(\d{2,6})/i);
  if (projectedScoreMatch) out.projectedScore = Number(projectedScoreMatch[1]);

  const bestMatch = text.match(/best\s*possible\s*finish[\s\S]{0,50}?(\d+)(?:st|nd|rd|th)?/i);
  if (bestMatch) out.best = Number(bestMatch[1]);

  const bestScoreMatch = text.match(/best\s*possible[\s\S]{0,70}?(\d{2,6})/i);
  if (bestScoreMatch) out.bestScore = Number(bestScoreMatch[1]);

  const worstMatch = text.match(/worst\s*possible\s*finish[\s\S]{0,50}?(\d+)(?:st|nd|rd|th)?/i);
  if (worstMatch) out.worst = Number(worstMatch[1]);

  const worstScoreMatch = text.match(/worst\s*possible[\s\S]{0,70}?(\d{2,6})/i);
  if (worstScoreMatch) out.worstScore = Number(worstScoreMatch[1]);

  return out;
}

function sortClans(clans, myTag) {
  const normalizedMy = String(myTag || "").toUpperCase();
  return [...clans]
    .sort((a, b) => {
      if (a.isMe && !b.isMe) return -1;
      if (!a.isMe && b.isMe) return 1;
      if ((b.totalShown || 0) !== (a.totalShown || 0)) return (b.totalShown || 0) - (a.totalShown || 0);
      return (a.rank || 99) - (b.rank || 99);
    })
    .map((c, i) => ({ ...c, rank: i + 1, isMe: c.tag === normalizedMy || c.isMe }));
}

function parseRace(html, myTag) {
  const text = cleanText(new DOMParser().parseFromString(html, "text/html").body?.innerText || html);
  const meta = extractMeta(text);

  let clans = extractClanArraysFromJson(html, myTag);
  if (!clans.length) clans = extractClansFromText(html, myTag);
  clans = sortClans(clans, myTag);

  if (!meta.projected && clans.length) {
    const meIndex = clans.findIndex(c => c.isMe);
    if (meIndex >= 0) meta.projected = meIndex + 1;
  }

  if (!meta.best) meta.best = 1;
  if (!meta.worst) meta.worst = Math.max(1, clans.length || 5);
  if (!meta.projectedScore && clans.length) {
    const me = clans.find(c => c.isMe) || clans[0];
    meta.projectedScore = me?.totalShown || me?.fame || null;
  }
  if (!meta.bestScore && clans.length) {
    meta.bestScore = clans[0]?.totalShown || clans[0]?.fame || null;
  }
  if (!meta.worstScore && clans.length) {
    const last = clans[clans.length - 1];
    meta.worstScore = last?.totalShown || last?.fame || null;
  }
  if (meta.battlesLeft == null) {
    const me = clans.find(c => c.isMe);
    meta.battlesLeft = me?.attacksLeft ?? null;
  }
  if (meta.duelsLeft == null) {
    const me = clans.find(c => c.isMe);
    meta.duelsLeft = me?.duelsLeft ?? null;
  }

  return {
    ...meta,
    clans
  };
}

function setLoading(panelEl) {
  panelEl.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>Caricamento dati in corso...</div>`;
}

function setError(panelEl, msg, idx) {
  panelEl.innerHTML = `
    <div class="error-state">⚠ ${escHtml(msg)}</div>
    <div style="text-align:center;">
      <button class="refresh-btn" onclick="reloadPanel(${idx})">${SVG_REFRESH} Riprova</button>
    </div>
  `;
}

function renderDayBar(currentDay, isTraining) {
  let activeIndex = 0;
  if (!isTraining && currentDay > 0) activeIndex = currentDay;
  return `
    <div class="day-bar">
      ${DAY_DEF.map((d, i) => {
        const classes = [
          "day-step",
          i === 0 ? "training" : "",
          i === activeIndex ? "active" : "",
          i < activeIndex ? "completed" : ""
        ].filter(Boolean).join(" ");
        return `
          <div class="${classes}">
            <div class="day-icon">${d.icon}</div>
            <div class="day-label">${d.label}</div>
            ${d.sub ? `<div class="day-sub">${d.sub}</div>` : ``}
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderHero(data, clanRef) {
  const me = data.clans.find(c => c.isMe) || data.clans[0] || {};
  const warDayText = data.isTraining ? "Training" : (data.currentDay ? `Day ${data.currentDay}` : "Live");
  const rankText = data.projected ? ordinal(data.projected) : "—";
  const scoreText = me.totalShown != null ? fmtNum(me.totalShown) : fmtNum(me.fame);
  return `
    <div class="hero-card">
      <div class="hero-grid">
        <div class="hero-box">
          <div class="hero-box-label">Clan selezionato</div>
          <div class="hero-main">${escHtml(clanRef.name)}</div>
          <div class="hero-sub">#${escHtml(clanRef.tag)}</div>
        </div>
        <div class="hero-box">
          <div class="hero-box-label">Stato race</div>
          <div class="hero-main hero-day">${escHtml(warDayText)}</div>
          <div class="hero-sub">Projected finish: ${escHtml(rankText)}</div>
        </div>
        <div class="hero-box">
          <div class="hero-box-label">Punti attuali</div>
          <div class="hero-main">${scoreText}</div>
          <div class="hero-sub">Fame + repair points</div>
        </div>
        <div class="hero-box">
          <div class="hero-box-label">Azioni residue</div>
          <div class="hero-main">${data.battlesLeft ?? "—"} / ${data.duelsLeft ?? "—"}</div>
          <div class="hero-sub">Battles left / duels left</div>
        </div>
      </div>
    </div>
  `;
}

function renderClanRow(clan, idx) {
  const rankClass = clan.rank === 1 ? "rank-1" : clan.rank === 2 ? "rank-2" : clan.rank === 3 ? "rank-3" : "rank-other";
  const maxFame = 10000;
  const fame = clan.fame || 0;
  const repair = clan.repairPoints || 0;
  const total = clan.totalShown || fame;
  const famePct = Math.max(0, Math.min(100, (fame / maxFame) * 100));
  const repairPct = Math.max(0, Math.min(100 - famePct, (repair / maxFame) * 100));

  return `
    <div class="clan-row ${clan.isMe ? "highlight" : ""}" style="animation-delay:${idx * 70}ms">
      <div class="rank-badge ${rankClass}">${clan.rank}</div>
      <div class="clan-icon">${clan.isMe ? "🔥" : "🏰"}</div>
      <div class="clan-main">
        <div class="clan-top-row">
          <div class="clan-name">${escHtml(clan.name)}</div>
          <div class="stat-pill">${SVG_TROPHY}<span>${fmtNum(fame)}</span></div>
          <div class="stat-pill">${SVG_SWORD}<span>${clan.attacksLeft ?? "—"}</span></div>
          <div class="stat-pill">${SVG_SHIELD}<span>${clan.duelsLeft ?? "—"}</span></div>
        </div>
        <div class="progress-track">
          <div class="progress-fill fill-pink" style="width:${famePct}%"></div>
          <div class="progress-fill fill-orange" style="width:${famePct + repairPct}%"></div>
        </div>
      </div>
      <div class="clan-right">
        <div class="fame-value">${fmtNum(total)}</div>
        ${clan.avgScore != null ? `<div class="avg-value">${Number(clan.avgScore).toFixed(2)}</div>` : `<div class="avg-value">${clan.tag ? "#" + escHtml(clan.tag) : ""}</div>`}
      </div>
    </div>
  `;
}

function renderStats(data) {
  return `
    <div class="section-card">
      <div class="section-title">Clan Stats</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Battles Left</div>
          <div class="stat-card-value">${data.battlesLeft ?? "—"}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Duels Left</div>
          <div class="stat-card-value">${data.duelsLeft ?? "—"}</div>
        </div>
      </div>
      <div class="finish-cards">
        <div class="finish-card">
          <div class="finish-ring projected">${data.projected ? ordinal(data.projected) : "—"}</div>
          <div class="finish-label">Projected<br>Finish</div>
          <div class="finish-score">${fmtNum(data.projectedScore)}</div>
        </div>
        <div class="finish-card">
          <div class="finish-ring best">${data.best ? ordinal(data.best) : "—"}</div>
          <div class="finish-label">Best<br>Possible</div>
          <div class="finish-score">${fmtNum(data.bestScore)}</div>
        </div>
        <div class="finish-card">
          <div class="finish-ring worst">${data.worst ? ordinal(data.worst) : "—"}</div>
          <div class="finish-label">Worst<br>Possible</div>
          <div class="finish-score">${fmtNum(data.worstScore)}</div>
        </div>
      </div>
    </div>
  `;
}

function renderPanel(panelEl, data, idx) {
  const clanRef = clanEntries[idx];
  panelEl.innerHTML = `
    ${renderHero(data, clanRef)}
    ${renderDayBar(data.currentDay, data.isTraining)}
    <div class="section-card">
      <div class="section-title">Race Ranking</div>
      <div class="clans-list">
        ${data.clans.length ? data.clans.map((c, i) => renderClanRow(c, i)).join("") : `<div class="error-state">Nessun dato clan disponibile.</div>`}
      </div>
    </div>
    ${renderStats(data)}
    <div class="last-updated">
      Aggiornato alle ${new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}
      <br>
      <button class="refresh-btn" onclick="reloadPanel(${idx})">${SVG_REFRESH} Aggiorna</button>
      <div class="mini-note">Dati letti da CWStats race source tramite proxy.</div>
    </div>
  `;
}

async function loadPanel(idx) {
  const panelEl = document.getElementById(`panel-${idx}`);
  if (!panelEl) return;

  if (cache[idx]) {
    renderPanel(panelEl, cache[idx], idx);
    return;
  }

  setLoading(panelEl);

  try {
    const html = await fetchRaceHtml(clanEntries[idx].tag);
    const data = parseRace(html, clanEntries[idx].tag);
    cache[idx] = data;
    renderPanel(panelEl, data, idx);
  } catch (e) {
    setError(panelEl, "Impossibile caricare i dati della race. Riprova tra qualche secondo.", idx);
  }
}

async function reloadPanel(idx) {
  delete cache[idx];
  await loadPanel(idx);
}

function switchTab(idx) {
  activeIdx = idx;
  document.querySelectorAll(".clan-tab").forEach((el, i) => el.classList.toggle("active", i === idx));
  document.querySelectorAll(".war-panel").forEach((el, i) => el.classList.toggle("active", i === idx));
  loadPanel(idx);
}

async function init() {
  try {
    clanEntries = await fetchSettingRows();
  } catch {
    clanEntries = [];
  }

  if (!clanEntries.length) {
    document.getElementById("warPanels").innerHTML = `<div class="error-state">Nessun tag trovato nel foglio Google. Controlla il foglio setting, colonna C, righe 3-6.</div>`;
    return;
  }

  const tabsEl = document.getElementById("clanTabs");
  const panelsEl = document.getElementById("warPanels");

  clanEntries.forEach((entry, i) => {
    const tab = document.createElement("button");
    tab.className = "clan-tab" + (i === 0 ? " active" : "");
    tab.textContent = entry.name;
    tab.onclick = () => switchTab(i);
    tabsEl.appendChild(tab);

    const panel = document.createElement("div");
    panel.className = "war-panel" + (i === 0 ? " active" : "");
    panel.id = `panel-${i}`;
    panelsEl.appendChild(panel);
  });

  loadPanel(0);
}

init();
</script>
