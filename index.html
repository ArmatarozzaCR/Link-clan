<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Link - Armata Rozza</title>
<style>
html, body {
  margin: 0;
  padding: 0;
}

:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("./background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-color: #120000;
  color: var(--text);
  text-align: center;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  opacity: .9;
}

#mobileContent {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 130px 6px 20px;
}

#mobileContent::before {
  content: "";
  position: absolute;
  top: 143px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 2px);
  max-width: none;
  bottom: 30px;
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.25));
  box-shadow:
    0 12px 30px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.04);
  z-index: 0;
}

#dynamicTop,
#linkContainer {
  position: relative;
  z-index: 1;
}

#verificaContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto 22px auto;
}

#verificaInput {
  width: 100%;
  padding: 15px 18px;
  border-radius: 18px;
  border: 2px solid rgba(255, 55, 35, 0.95);
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 2px;
  background: linear-gradient(180deg, rgba(45, 0, 0, 0.88), rgba(20, 0, 0, 0.84));
  color: #fff;
  outline: none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 0 12px rgba(255,0,0,0.25),
    0 6px 18px rgba(0,0,0,0.22);
  transition: .25s ease;
  text-align: center;
}

#verificaInput::placeholder {
  color: rgba(255,255,255,0.72);
  font-weight: 600;
}

#verificaInput:focus {
  border-color: #ff6a4f;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08) inset,
    0 0 22px rgba(255,40,0,0.42),
    0 8px 20px rgba(0,0,0,0.24);
  transform: translateY(-1px);
}

.button {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 18px;
  width: 100%;
  max-width: 400px;
  margin: 16px auto;
  padding: 17px 18px;
  background: linear-gradient(135deg, rgba(25,25,25,0.93), rgba(65,8,8,0.88) 58%, rgba(95,15,15,0.78));
  border: 2px solid var(--red-1);
  border-radius: 20px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 800;
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease;
  box-shadow:
    0 0 10px rgba(255, 20, 0, 0.40),
    0 0 24px rgba(255, 60, 0, 0.12),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  animation: glowPulse 3.2s infinite alternate ease-in-out;
  overflow: hidden;
}

.button::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.09) 18%, transparent 36%);
  transform: translateX(-130%);
  transition: transform .65s ease;
  pointer-events: none;
}

.button::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 18px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 24%, transparent 76%, rgba(0,0,0,0.10));
}

.button:hover::before {
  transform: translateX(130%);
}

.button:hover {
  background: linear-gradient(135deg, rgba(42,10,10,0.98), rgba(90,8,8,0.92) 58%, rgba(120,15,15,0.84));
  transform: translateY(-2px) scale(1.008);
  box-shadow:
    0 0 18px rgba(255, 30, 0, 0.62),
    0 0 34px rgba(255, 80, 0, 0.18),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  border-color: #ff5a3a;
  animation-play-state: paused;
}

.button:active {
  transform: scale(0.985);
}

.button.convocato {
  border-color: #00e676;
  animation: greenPulse 1.8s infinite alternate ease-in-out;
}

.button.convocato:hover {
  border-color: #69ff9a;
  animation-play-state: paused;
}

@keyframes greenPulse {
  0% {
    box-shadow:
      0 0 8px rgba(0, 230, 118, 0.55),
      0 0 18px rgba(0, 200, 90, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  50% {
    box-shadow:
      0 0 22px rgba(0, 230, 118, 0.90),
      0 0 40px rgba(0, 255, 120, 0.28),
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  100% {
    box-shadow:
      0 0 8px rgba(0, 230, 118, 0.55),
      0 0 18px rgba(0, 200, 90, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
}

.button-label {
  font-size: 20px;
  flex-grow: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.2px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
  position: relative;
  z-index: 1;
}

.clan-logo {
  width: 75px;
  height: 75px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(255,0,0,0.4));
}

.trophy-box {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 5px;
  min-width: 70px;
  margin-left: auto;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}

.trophy-icon {
  width: 20px !important;
  height: 20px !important;
  object-fit: contain;
  opacity: 0.95;
  flex-shrink: 0;
  filter: none !important;
}

.trophy-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  white-space: nowrap;
}

#verificaBtn {
  justify-content: center;
  text-align: center;
  min-height: 58px;
}

#verificaBtn .button-label {
  text-align: center;
}

#verificaRisultato {
  display: none;
  margin-top: 14px;
  font-size: 17px;
  color: #ffffff;
  text-align: center;
  line-height: 1.8;
  font-weight: 500;
  word-break: break-word;
  overflow-wrap: anywhere;
  padding: 14px 18px;
  background: rgba(0, 0, 0, 0.50);
  border: 1px solid rgba(255, 60, 0, 0.40);
  border-radius: 16px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}

#verificaRisultato.trovato {
  border-color: rgba(0, 200, 90, 0.50);
}

#verificaRisultato.non-trovato {
  border-color: rgba(255, 40, 40, 0.45);
  color: #ff8a8a;
}

#linkContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}

.offline-box {
  width: 100%;
  max-width: 400px;
  margin: 52px auto 0;
  padding: 20px 18px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.50);
  border: 1px solid rgba(255, 60, 0, 0.40);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow:
    0 4px 18px rgba(0,0,0,0.30),
    inset 0 1px 0 rgba(255,255,255,0.04);
  color: #ffffff;
  text-align: center;
  line-height: 1.6;
}

.offline-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 8px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
}

.offline-text {
  font-size: 17px;
  color: rgba(255,255,255,0.88);
}

@keyframes glowPulse {
  0% {
    box-shadow:
      0 0 8px rgba(255, 0, 0, 0.45),
      0 0 18px rgba(255, 70, 0, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  50% {
    box-shadow:
      0 0 20px rgba(255, 60, 0, 0.80),
      0 0 38px rgba(255, 110, 0, 0.20),
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255, 0, 0, 0.45),
      0 0 18px rgba(255, 70, 0, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.25);
  }
}

@media (max-width: 420px) {
  #mobileContent {
    padding: 180px 12px 16px;
  }

  #mobileContent::before {
    width: calc(100% - 18px);
  }

  .button {
    gap: 14px;
    padding: 15px 16px;
    border-radius: 18px;
  }

  .button::after {
    border-radius: 16px;
  }

  .button-label {
    font-size: 18px;
  }

  .clan-logo {
    width: 68px !important;
    height: 68px !important;
  }

  .trophy-box {
    min-width: 64px;
    gap: 4px;
  }

  .trophy-icon {
    width: 18px !important;
    height: 18px !important;
  }

  .trophy-value {
    font-size: 14px;
  }

  #verificaInput {
    font-size: 17px;
    padding: 14px 16px;
  }

  #verificaRisultato {
    font-size: 16px;
  }

  .offline-box {
    margin: 46px auto 0;
    padding: 18px 16px;
    border-radius: 18px;
  }

  .offline-title {
    font-size: 20px;
  }

  .offline-text {
    font-size: 16px;
  }
}
</style>
<script>
const SHEET_ID = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
const CLAN_SHEETS = ["Armata Rozza", "I Tori Feroci", "Dog Rider", "Warlosing", "Baby Rozza"];
const TROPHY_ICON = "./cw-trophy.png";

function normalizeName(value) {
  return String(value || "")
    .normalize("NFKC")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .replace(/\u00A0/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

async function leggiFoglio(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Errore lettura foglio ${sheetName}`);

  const text = await res.text();
  const jsonText = text
    .replace(/^\/\*O_o\*\/\s*/, "")
    .replace(/^google\.visualization\.Query\.setResponse\(/, "")
    .replace(/\);$/, "");

  const data = JSON.parse(jsonText);
  return data.table.rows || [];
}

async function leggiSettingCompleto() {
  try {
    const rows = await leggiFoglio("setting");
    const trophyMap = {};
    const trophyMapNormalized = {};

    for (let i = 0; i < rows.length; i++) {
      const cells = rows[i].c || [];
      const colA = String((cells[0] && cells[0].v) || "").trim();
      const colB = String((cells[1] && cells[1].v) || "").trim();

      if (!colA || !colB) continue;
      if (normalizeName(colA) === "convocazioni") continue;

      trophyMap[colA] = colB;
      trophyMapNormalized[normalizeName(colA)] = colB;
    }

    return { trophyMap, trophyMapNormalized };
  } catch {
    return { trophyMap: {}, trophyMapNormalized: {} };
  }
}

async function convocazioniAttive() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=setting&range=B1&tqx=out:json`;
    const res = await fetch(url);
    if (!res.ok) return true;

    const text = await res.text();
    const jsonText = text
      .replace(/^\/\*O_o\*\/\s*/, "")
      .replace(/^google\.visualization\.Query\.setResponse\(/, "")
      .replace(/\);$/, "");

    const data = JSON.parse(jsonText);

    const valore = String(
      data.table.rows?.[0]?.c?.[0]?.v || ""
    ).trim().toLowerCase();

    return valore === "on";

  } catch {
    return true;
  }
}

async function caricaLink() {
  try {
    const [res, setting] = await Promise.all([
      fetch("https://nameless-brook-094f.cr-armatarozza.workers.dev/", { headers: { referer: location.origin } }),
      leggiSettingCompleto()
    ]);

    if (!res.ok) {
      throw new Error();
    }

    const data = await res.json();
    const container = document.getElementById("linkContainer");

    for (const item of data) {
      const div = document.createElement("div");
      div.className = "button";
      div.dataset.nomeClan = normalizeName(item.nome);
      div.onclick = async () => {
        try {
          const tokenRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}`, { headers: { referer: location.origin } });
          if (!tokenRes.ok) throw new Error();

          const tokenData = await tokenRes.json();
          if (!tokenData.token) return alert("Token non ricevuto");

          const urlRes = await fetch(`https://nameless-brook-094f.cr-armatarozza.workers.dev/?id=${item.id}&token=${tokenData.token}`, { headers: { referer: location.origin } });
          if (!urlRes.ok) {
            const text = await urlRes.text();
            return alert("Errore apertura link: " + text);
          }

          const urlData = await urlRes.json();
          if (urlData.url) {
            window.location.href = urlData.url;
          } else {
            alert("Link non disponibile");
          }
        } catch {
          alert("Errore apertura link");
        }
      };

      const img = document.createElement("img");
      img.className = "clan-logo";
      img.src = item.img;
      img.alt = item.nome;

      const span = document.createElement("span");
      span.className = "button-label";
      span.textContent = item.nome;

      const trophyBox = document.createElement("div");
      trophyBox.className = "trophy-box";

      const trophyIcon = document.createElement("img");
      trophyIcon.className = "trophy-icon";
      trophyIcon.src = TROPHY_ICON;
      trophyIcon.alt = "Coppe";

      const trophyValue = document.createElement("span");
      trophyValue.className = "trophy-value";

      const nomePulito = normalizeName(item.nome);
      trophyValue.textContent = setting.trophyMapNormalized[nomePulito] || "-";

      trophyBox.appendChild(trophyIcon);
      trophyBox.appendChild(trophyValue);

      div.appendChild(img);
      div.appendChild(span);
      div.appendChild(trophyBox);
      container.appendChild(div);
    }
  } catch {
    document.getElementById("dynamicTop").innerHTML = `
      <div class="offline-box">
        <div class="offline-title">La war è iniziata</div>
        <div class="offline-text">I link non sono più disponibili</div>
      </div>
    `;
    document.getElementById("linkContainer").innerHTML = "";
  }
}

async function verificaConvocazione() {
  const outputEl = document.getElementById("verificaRisultato");

  const attive = await convocazioniAttive();

  if (!attive) {
    outputEl.innerHTML = "Le convocazioni non sono ancora disponibili";
    outputEl.className = "";
    outputEl.style.display = "block";
    return;
  }

  let tag = document.getElementById("verificaInput").value.trim();
  if (!tag) return;

  tag = tag.replace(/^@+/, "").toUpperCase();
  localStorage.setItem("ultimoTag", tag);

  document.querySelectorAll("#linkContainer .button.convocato").forEach(btn => {
    btn.classList.remove("convocato");
  });

  try {
    outputEl.innerHTML = "Controllo in corso...";
    outputEl.className = "";
    outputEl.style.display = "block";

    let risultati = [];
    const clanConvocati = new Set();

    for (const sheetName of CLAN_SHEETS) {
      const rows = await leggiFoglio(sheetName);

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const cells = row.c || [];

        let nome = String((cells[0] && cells[0].v) || "").trim();
        let tagCell = String((cells[1] && cells[1].v) || "").replace(/^@+/, "").toUpperCase().trim();

        if (tagCell && tagCell === tag) {
          risultati.push(`• Sei convocato in <strong>${sheetName}</strong> con l'account ${nome}`);
          clanConvocati.add(normalizeName(sheetName));
        }
      }
    }

    document.querySelectorAll("#linkContainer .button").forEach(btn => {
      if (clanConvocati.has(btn.dataset.nomeClan)) {
        btn.classList.add("convocato");
      }
    });

    if (risultati.length) {
      outputEl.innerHTML = risultati.join("<br>");
      outputEl.className = "trovato";
    } else {
      outputEl.innerHTML = `❌ Tag "${tag}" non trovato nelle convocazioni`;
      outputEl.className = "non-trovato";
    }

    outputEl.style.display = "block";

  } catch (e) {
    console.error("Errore:", e);
    outputEl.innerHTML = "Errore caricamento dati";
    outputEl.className = "non-trovato";
    outputEl.style.display = "block";
  }
}

window.onload = function () {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (!isMobile) {
    document.body.innerHTML = `<div style="font-size:22px; line-height:1.5; padding:20px; box-sizing:border-box; color:white; background:black;">⚠️ Questo sito può essere aperto solo da dispositivi mobili con installato Clash Royale.<br>Per favore aprilo sul tuo smartphone o tablet.</div>`;
    return;
  }

  const container = document.getElementById("dynamicTop");
  const verificaDiv = document.createElement("div");
  verificaDiv.id = "verificaContainer";

  const input = document.createElement("input");
  input.id = "verificaInput";
  input.placeholder = "Inserisci il tuo tag Telegram";
  verificaDiv.appendChild(input);

  setTimeout(() => {
    const ultimoTag = localStorage.getItem("ultimoTag");
    if (ultimoTag) {
      input.value = ultimoTag;
    }
  }, 0);

  const btn = document.createElement("div");
  btn.className = "button";
  btn.id = "verificaBtn";
  btn.onclick = verificaConvocazione;

  const btnLabel = document.createElement("span");
  btnLabel.className = "button-label";
  btnLabel.textContent = "Verifica convocazione";
  btn.appendChild(btnLabel);

  verificaDiv.appendChild(btn);

  const output = document.createElement("div");
  output.id = "verificaRisultato";
  verificaDiv.appendChild(output);

  container.appendChild(verificaDiv);

  caricaLink();
};

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (
    e.keyCode === 123 ||
    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
    (e.ctrlKey && e.keyCode === 85) ||
    (e.ctrlKey && e.keyCode === 83)
  ) {
    e.preventDefault();
    return false;
  }
});
</script>
</head>
<body>
  <div id="mobileContent">
    <div id="dynamicTop"></div>
    <div id="linkContainer"></div>
  </div>
</body>
</html>
