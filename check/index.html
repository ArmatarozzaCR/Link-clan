<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Check Convocazioni - Armata Rozza</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
        linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(0,0,0,0.65)),
        url("../background.jpg");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      background-color: #120000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
        radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
        radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
        radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
      mix-blend-mode: screen;
      opacity: .9;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 28px 22px 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.30), rgba(0,0,0,0.45));
      box-shadow:
        0 12px 30px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      animation: panelFadeIn .55s ease;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      margin: 0 0 10px;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
      animation: fadeUp .45s ease .05s both;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.5;
      color: rgba(255,255,255,0.88);
      margin: 0 0 22px;
      animation: fadeUp .45s ease .12s both;
    }

    .button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
      padding: 16px 18px;
      background: linear-gradient(135deg, rgba(25,25,25,0.95), rgba(65,8,8,0.90) 58%, rgba(95,15,15,0.82));
      border: 2px solid #ff1a1a;
      border-radius: 20px;
      cursor: pointer;
      font-size: 19px;
      font-weight: 900;
      color: #fff;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease, opacity .22s ease, background .22s ease;
      box-shadow:
        0 0 12px rgba(255, 20, 0, 0.40),
        0 0 24px rgba(255, 60, 0, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.25);
      overflow: hidden;
      animation: glowPulse 3s infinite alternate ease-in-out, fadeUp .45s ease .2s both;
    }

    .button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.10) 18%, transparent 36%);
      transform: translateX(-130%);
      transition: transform .65s ease;
      pointer-events: none;
    }

    .button:hover::before {
      transform: translateX(130%);
    }

    .button:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: #ff5a3a;
      background: linear-gradient(135deg, rgba(42,10,10,0.98), rgba(90,8,8,0.92) 58%, rgba(120,15,15,0.84));
      box-shadow:
        0 0 18px rgba(255, 30, 0, 0.62),
        0 0 34px rgba(255, 80, 0, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.25);
      animation-play-state: paused;
    }

    .button:disabled {
      opacity: 0.68;
      cursor: not-allowed;
      transform: none;
      animation: none;
    }

    .button:disabled:hover {
      transform: none;
    }

    .statusBox {
      display: none;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.10);
      line-height: 1.6;
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
      animation: fadeUp .35s ease;
    }

    .statusBox.show {
      display: block;
    }

    .statusBox.waiting {
      color: #ffd54a;
      border-color: rgba(255, 190, 40, 0.35);
    }

    .statusBox.success {
      color: #8dffb3;
      border-color: rgba(0, 230, 118, 0.40);
    }

    .statusBox.error {
      color: #ff9b9b;
      border-color: rgba(255, 50, 50, 0.38);
    }

    .actions {
      display: none;
      margin-top: 14px;
      gap: 10px;
      flex-direction: column;
      animation: fadeUp .35s ease;
    }

    .actions.show {
      display: flex;
    }

    .secondaryBtn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      padding: 13px 16px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
      box-sizing: border-box;
      overflow: hidden;
      cursor: pointer;
      font-family: inherit;
    }

    .secondaryBtn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
    }

    .secondaryBtn.accent {
      background: linear-gradient(135deg, rgba(25,25,25,0.95), rgba(65,8,8,0.90) 58%, rgba(95,15,15,0.82));
      border: 2px solid #ff1a1a;
      box-shadow:
        0 0 10px rgba(255, 20, 0, 0.35),
        0 0 20px rgba(255, 60, 0, 0.10);
      animation: glowPulse 3s infinite alternate ease-in-out;
    }

    .secondaryBtn.accent:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: #ff5a3a;
      background: linear-gradient(135deg, rgba(42,10,10,0.98), rgba(90,8,8,0.92) 58%, rgba(120,15,15,0.84));
      animation-play-state: paused;
    }

    .divider {
      display: none;
      margin: 20px 0 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .divider.show {
      display: block;
    }

    .timestamp {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.2px;
      animation: fadeUp .4s ease;
    }

    .timestamp.show {
      display: block;
    }

    .timestamp strong {
      color: rgba(255,255,255,0.62);
      font-weight: 700;
    }

    .dots {
      display: inline-block;
      min-width: 22px;
      text-align: left;
    }

    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(10px) scale(.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowPulse {
      0% {
        box-shadow:
          0 0 12px rgba(255, 20, 0, 0.40),
          0 0 24px rgba(255, 60, 0, 0.12),
          inset 0 1px 0 rgba(255,255,255,0.08),
          inset 0 -1px 0 rgba(0,0,0,0.25);
      }
      50% {
        box-shadow:
          0 0 20px rgba(255, 60, 0, 0.80),
          0 0 38px rgba(255, 110, 0, 0.20),
          inset 0 1px 0 rgba(255,255,255,0.10),
          inset 0 -1px 0 rgba(0,0,0,0.25);
      }
      100% {
        box-shadow:
          0 0 12px rgba(255, 20, 0, 0.40),
          0 0 24px rgba(255, 60, 0, 0.12),
          inset 0 1px 0 rgba(255,255,255,0.08),
          inset 0 -1px 0 rgba(0,0,0,0.25);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <h1 class="title">Check convocazioni</h1>
    <p class="subtitle">Premi il pulsante per avviare l'aggiornamento automatico delle convocazioni</p>

    <button id="startBtn" class="button">Avvia check convocazioni</button>

    <div
      id="statusBox"
      class="statusBox"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <div id="actions" class="actions">
      <a
        id="openSheetBtn"
        class="secondaryBtn accent"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
      >
        Apri il file Google
      </a>
      <button id="retryBtn" class="secondaryBtn" style="display:none;">
        Riprova
      </button>
    </div>

    <hr id="tsDivider" class="divider" />
    <p id="timestampBox" class="timestamp"></p>

  </div>

  <script>
    const SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMUXgqS3ULU0UekRqddVL4Z4BnNKZqBLV0AqdV4AA7PtoI7Nd045Tftrx_a4iRzHyQ8c1Vi8FzeTAWqM9S9tXrC0d1ME6PhSSkktyfSZqprvhycwSLidVbWH-qVDQYvR-n67wXrfa92r51ol9iaPdEaH7EZDdtDafujiP6rTEEyF8kOq5V8gl7km4yXrPcL5If0lwDpkwkBFx3RmtbVVDlL24C88VHPsfCL7teulUO6n6lM9-WmI-kJGEE_u1iEssKnLAHglJNQr6BY7qUoB8AIJuNZArw&lib=MDGe9bDQr1x_w4KSRQI3x9o5ljRdC-B99";
    const SHEET_URL  = "https://docs.google.com/spreadsheets/d/1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A/edit?gid=1516163823#gid=1516163823";

    const startBtn     = document.getElementById("startBtn");
    const statusBox    = document.getElementById("statusBox");
    const actions      = document.getElementById("actions");
    const openSheetBtn = document.getElementById("openSheetBtn");
    const retryBtn     = document.getElementById("retryBtn");
    const tsDivider    = document.getElementById("tsDivider");
    const timestampBox = document.getElementById("timestampBox");

    openSheetBtn.href = SHEET_URL;

    let dotsInterval = null;
    let dotsEl = null;

    function setStatus(type, html) {
      statusBox.className = "statusBox show " + type;
      statusBox.innerHTML = html;
    }

    function startWaitingAnimation() {
      statusBox.className = "statusBox show waiting";
      statusBox.innerHTML = 'Attendi<span class="dots" id="dotsSpan"></span><br>aggiornamento convocazioni in corso';
      dotsEl = document.getElementById("dotsSpan");
      let count = 0;
      dotsInterval = setInterval(() => {
        count = (count + 1) % 4;
        if (dotsEl) dotsEl.textContent = ".".repeat(count);
      }, 450);
    }

    function stopWaitingAnimation() {
      if (dotsInterval) {
        clearInterval(dotsInterval);
        dotsInterval = null;
      }
      dotsEl = null;
    }

    function showTimestamp(raw) {
      if (!raw || !raw.trim()) return;
      tsDivider.classList.add("show");
      timestampBox.classList.add("show");
      timestampBox.innerHTML = "Ultimo aggiornamento: <strong>" + raw.trim() + "</strong>";
    }

    async function avviaCheck() {
      startBtn.disabled = true;
      actions.classList.remove("show");
      retryBtn.style.display = "none";
      tsDivider.classList.remove("show");
      timestampBox.classList.remove("show");

      startWaitingAnimation();

      try {
        const response = await fetch(SCRIPT_URL, { method: "GET", cache: "no-store" });
        const text = await response.text();

        if (!response.ok) throw new Error(text || "Errore durante l'esecuzione dello script");

        const normalized = String(text || "").trim().toUpperCase();
        stopWaitingAnimation();

        if (normalized.startsWith("OK")) {
          setStatus("success", "Convocazioni aggiornate");
          retryBtn.style.display = "none";
          actions.classList.add("show");
          await fetchTimestamp();
        } else {
          throw new Error(text || "Risposta non valida");
        }
      } catch (error) {
        stopWaitingAnimation();
        setStatus("error", "Errore durante l'aggiornamento delle convocazioni.");
        retryBtn.style.display = "";
        actions.classList.add("show");
        console.error(error);
      } finally {
        startBtn.disabled = false;
      }
    }

    async function fetchTimestamp() {
      const SHEET_ID  = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
      const RANGE     = "setting!F2";
      const API_KEY   = "";
      if (!API_KEY) {
        showTimestamp(new Date().toLocaleString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }));
        return;
      }
      try {
        const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + encodeURIComponent(RANGE) + "?key=" + API_KEY;
        const res  = await fetch(url, { cache: "no-store" });
        const json = await res.json();
        const val  = json.values && json.values[0] && json.values[0][0];
        if (val) showTimestamp(val);
      } catch (e) {
        console.warn("Timestamp non disponibile", e);
      }
    }

    startBtn.addEventListener("click", avviaCheck);
    retryBtn.addEventListener("click", avviaCheck);
  </script>
</body>
</html>
