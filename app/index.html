<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Armata Rozza" />
<meta name="theme-color" content="#120000" />
<title>Family Rozza</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ArmatarozzaCR/Link-clan/main/Icona.png" />
<style>

/* ── RESET identico al sito ufficiale ── */
html, body {
  margin: 0;
  padding: 0;
}

:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* ── BODY con sfondo — identico al sito ufficiale ── */
body {
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("https://raw.githubusercontent.com/ArmatarozzaCR/Link-clan/main/background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-color: #120000;
  color: var(--text);
  text-align: center;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── Gradienti decorativi fissi — solo overlay, non lo sfondo ── */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  opacity: .9;
  z-index: 0;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ══════════════════════════════════════════
   VIEW A — INSTALLAZIONE
══════════════════════════════════════════ */
#viewInstall {
  position: relative;
  z-index: 1;
  /* occupa tutta la viewport incluse le safe area */
  min-height: 100vh;
  min-height: -webkit-fill-available;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  /* safe-area-inset per la barra di Safari */
  padding-top: max(18vh, calc(env(safe-area-inset-top, 0px) + 16vh));
  padding-left: 16px;
  padding-right: 16px;
  padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
}

#viewInstall-inner {
  width: 100%;
  max-width: 420px;
}

.app-icon {
  width: 90px;
  height: 90px;
  border-radius: 22px;
  box-shadow: 0 0 36px rgba(255,40,0,0.50), 0 8px 28px rgba(0,0,0,0.55);
  display: block;
  margin: 0 auto 14px;
  animation: floatIcon 3.2s ease-in-out infinite;
}

@keyframes floatIcon {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-7px); }
}

.app-name {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 0.4px;
  text-shadow: 0 2px 10px rgba(255,60,0,0.50);
  margin-bottom: 6px;
}

.app-tagline {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  margin-bottom: 22px;
  line-height: 1.5;
}

.install-card {
  background: linear-gradient(160deg, rgba(20,0,0,0.88), rgba(55,8,8,0.85));
  border: 1.5px solid rgba(255,60,0,0.42);
  border-radius: 20px;
  padding: 20px 16px;
  text-align: left;
  margin-bottom: 16px;
}

.install-card-title {
  /* su una riga sola */
  font-size: 15px;
  font-weight: 800;
  color: #ffd54a;
  text-align: center;
  margin-bottom: 18px;
  white-space: nowrap;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 15px;
}
.step:last-child { margin-bottom: 0; }

.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #cc1100, #ff4400);
  font-size: 13px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.step-body {
  font-size: 14px;
  line-height: 1.6;
  color: rgba(255,255,255,0.87);
}

.step-body strong { color: #fff; }

.tag-pill {
  display: inline;
  background: rgba(255,200,0,0.12);
  border: 1px solid rgba(255,200,0,0.30);
  border-radius: 6px;
  padding: 1px 6px;
  font-size: 12px;
  font-weight: 700;
  color: #ffd54a;
  white-space: nowrap;
}

.share-svg {
  display: inline-block;
  width: 18px; height: 18px;
  vertical-align: middle;
  margin: 0 2px -2px;
}

/* ══════════════════════════════════════════
   VIEW B — APP (identico al sito ufficiale)
══════════════════════════════════════════ */
#mobileContent {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 130px 6px 20px;
  z-index: 1;
}

#mobileContent::before {
  content: "";
  position: absolute;
  top: 143px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 2px);
  bottom: 30px;
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.25));
  box-shadow:
    0 12px 30px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.04);
  z-index: 0;
}

#dynamicTop,
#linkContainer {
  position: relative;
  z-index: 1;
}

#verificaContainer {
  width: 100%;
  max-width: 400px;
  margin: 0 auto 22px auto;
}

#verificaInput {
  width: 100%;
  padding: 15px 18px;
  border-radius: 18px;
  border: 2px solid rgba(255,55,35,0.95);
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 2px;
  background: linear-gradient(180deg, rgba(45,0,0,0.88), rgba(20,0,0,0.84));
  color: #fff;
  outline: none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 0 12px rgba(255,0,0,0.25),
    0 6px 18px rgba(0,0,0,0.22);
  transition: .25s ease;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
}

#verificaInput::placeholder { color: rgba(255,255,255,0.72); font-weight: 600; }
#verificaInput:focus {
  border-color: #ff6a4f;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08) inset,
    0 0 22px rgba(255,40,0,0.42),
    0 8px 20px rgba(0,0,0,0.24);
  transform: translateY(-1px);
}

.button {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 18px;
  width: 100%;
  max-width: 400px;
  margin: 16px auto;
  padding: 17px 18px;
  background: linear-gradient(135deg, rgba(25,25,25,0.93), rgba(65,8,8,0.88) 58%, rgba(95,15,15,0.78));
  border: 2px solid var(--red-1);
  border-radius: 20px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 800;
  transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease;
  box-shadow:
    0 0 10px rgba(255,20,0,0.40),
    0 0 24px rgba(255,60,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.25);
  animation: glowPulse 3.2s infinite alternate ease-in-out;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

.button:active { transform: scale(0.985); animation-play-state: paused; }

.button.convocato {
  border-color: #00e676;
  animation: greenPulse 1.8s infinite alternate ease-in-out;
}

.button-label {
  font-size: 20px;
  flex-grow: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.2px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
  position: relative; z-index: 1;
}

.clan-logo {
  width: 75px; height: 75px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(255,0,0,0.4));
}

.trophy-box {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 5px; min-width: 70px; margin-left: auto;
  position: relative; z-index: 1; flex-shrink: 0;
}

.trophy-icon {
  width: 20px; height: 20px;
  object-fit: contain; opacity: 0.95; flex-shrink: 0;
}

.trophy-value {
  font-size: 18px; font-weight: 800; color: var(--gold);
  text-shadow: 0 1px 3px rgba(0,0,0,0.6); white-space: nowrap;
}

#verificaRisultato {
  display: none;
  margin-top: 14px; font-size: 17px; color: #fff;
  text-align: center; line-height: 1.8; font-weight: 500;
  word-break: break-word; overflow-wrap: anywhere;
  padding: 14px 18px;
  background: rgba(0,0,0,0.50);
  border: 1px solid rgba(255,60,0,0.40);
  border-radius: 16px;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}

#verificaRisultato.trovato     { border-color: rgba(0,200,90,0.50); }
#verificaRisultato.non-trovato { border-color: rgba(255,40,40,0.45); color: #ff8a8a; }

.offline-box {
  width: 100%; max-width: 400px;
  margin: 52px auto 0; padding: 20px 18px;
  border-radius: 20px;
  background: rgba(0,0,0,0.50);
  border: 1px solid rgba(255,60,0,0.40);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 4px 18px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.04);
  color: #fff; text-align: center; line-height: 1.6;
}

.offline-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 5px rgba(0,0,0,0.45); }
.offline-text  { font-size: 17px; color: rgba(255,255,255,0.88); }

/* ── OVERLAY NESSUN LINK ── */
#noLinkOverlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
#noLinkOverlay.visible { display: flex; }

.nolink-card {
  background: linear-gradient(160deg, rgba(30,0,0,0.97), rgba(60,10,10,0.95));
  border: 2px solid rgba(255,60,0,0.55); border-radius: 26px;
  padding: 34px 28px 28px; max-width: 320px; width: 90%;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,30,0,0.25), 0 8px 32px rgba(0,0,0,0.5);
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}

.nolink-emoji { font-size: 58px; line-height: 1; margin-bottom: 12px; display: block; animation: wobble 1.2s ease infinite; }
.nolink-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 16px; text-shadow: 0 2px 8px rgba(255,60,0,0.5); }

.nolink-close {
  display: inline-block; padding: 12px 32px;
  background: linear-gradient(135deg, #ff1a1a, #ff5500);
  border-radius: 14px; font-size: 16px; font-weight: 800; color: #fff;
  cursor: pointer; box-shadow: 0 0 16px rgba(255,40,0,0.45);
}
.nolink-close:active { opacity: 0.85; }

/* ── ANIMAZIONI ── */
@keyframes glowPulse {
  0%   { box-shadow: 0 0 8px rgba(255,0,0,0.45),  0 0 18px rgba(255,70,0,0.10),  inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.25); }
  50%  { box-shadow: 0 0 20px rgba(255,60,0,0.80), 0 0 38px rgba(255,110,0,0.20), inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.25); }
  100% { box-shadow: 0 0 8px rgba(255,0,0,0.45),  0 0 18px rgba(255,70,0,0.10),  inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.25); }
}

@keyframes greenPulse {
  0%   { box-shadow: 0 0 8px rgba(0,230,118,0.55), 0 0 18px rgba(0,200,90,0.15), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.25); }
  50%  { box-shadow: 0 0 22px rgba(0,230,118,0.90), 0 0 40px rgba(0,255,120,0.28), inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.25); }
  100% { box-shadow: 0 0 8px rgba(0,230,118,0.55), 0 0 18px rgba(0,200,90,0.15), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.25); }
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

@keyframes wobble {
  0%,100% { transform: rotate(-6deg); }
  50%     { transform: rotate(6deg); }
}

/* ── RESPONSIVE identico al sito ── */
@media (max-width: 420px) {
  #mobileContent { padding: 180px 12px 16px; }
  .button { gap: 14px; padding: 15px 16px; border-radius: 18px; }
  .button-label { font-size: 18px; }
  .clan-logo { width: 68px; height: 68px; }
  .trophy-box { min-width: 64px; gap: 4px; }
  .trophy-icon { width: 18px; height: 18px; }
  .trophy-value { font-size: 14px; }
  #verificaInput { font-size: 17px; padding: 14px 16px; }
  #verificaRisultato { font-size: 16px; }
  .offline-box { margin: 46px auto 0; padding: 18px 16px; border-radius: 18px; }
  .offline-title { font-size: 20px; }
  .offline-text { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ══ VIEW A: INSTALLAZIONE ════════════════════════════════ -->
<div class="view" id="viewInstall">
  <div id="viewInstall-inner">

    <img class="app-icon"
         src="https://raw.githubusercontent.com/ArmatarozzaCR/Link-clan/main/Icona.png"
         alt="Armata Rozza" />

    <div class="app-name">Armata Rozza</div>
    <div class="app-tagline">L'app ufficiale della Family Rozza<br>per unirti ai clan su Clash Royale</div>

    <div class="install-card">
      <div class="install-card-title">📲 Salvala sulla schermata Home</div>

      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          Tocca <svg class="share-svg" viewBox="0 0 24 24" fill="none" stroke="#ffd54a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> <strong>Condividi</strong> in basso su Safari
        </div>
      </div>

      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          Clicca <span class="tag-pill">Aggiungi a schermata Home</span>
        </div>
      </div>

      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          Tocca <strong>"Aggiungi"</strong> in alto a destra ✅</div>
      </div>
    </div>

  </div>
</div>


<!-- ══ VIEW B: APP ══════════════════════════════════════════ -->
<div class="view" id="viewApp">
  <div id="mobileContent">
    <div id="dynamicTop"></div>
    <div id="linkContainer"></div>
  </div>
</div>


<!-- Overlay nessun link -->
<div id="noLinkOverlay" onclick="this.classList.remove('visible')">
  <div class="nolink-card" onclick="event.stopPropagation()">
    <span class="nolink-emoji">😴</span>
    <div class="nolink-title">Questa settimana<br>non si gioca qua!</div>
    <div class="nolink-close" onclick="document.getElementById('noLinkOverlay').classList.remove('visible')">OK, ho capito!</div>
  </div>
</div>


<script>
  const WORKER_URL  = "https://nameless-brook-094f.cr-armatarozza.workers.dev/";
  const REFERER     = "https://www.armatarozza.it";
  const SHEET_ID    = "1p97tgykgc5dxsweiPSvSGY53hmrL3j-duQkSk_zd30A";
  const CLAN_SHEETS = ["Armata Rozza", "I Tori Feroci", "Dog Rider", "Warlosing", "Baby Rozza"];
  const TROPHY_ICON = "https://raw.githubusercontent.com/ArmatarozzaCR/Link-clan/main/cw-trophy.png";

  const isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;

  document.getElementById(isStandalone ? "viewApp" : "viewInstall").classList.add("active");
  if (isStandalone) initApp();

  function normalizeName(v) {
    return String(v || "").normalize("NFKC")
      .replace(/[\u200B-\u200D\uFEFF]/g, "")
      .replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
  }

  async function leggiFoglio(sheetName) {
    const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&range=A1:B500&headers=0&tqx=out:json`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error();
    const text = await res.text();
    const json = JSON.parse(text.replace(/^\/\*O_o\*\/\s*/,"").replace(/^google\.visualization\.Query\.setResponse\(/,"").replace(/\);?\s*$/,""));
    return json.table.rows || [];
  }

  async function leggiTrophyMap() {
    try {
      const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=setting&range=A3:B6&tqx=out:json`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.replace(/^\/\*O_o\*\/\s*/,"").replace(/^google\.visualization\.Query\.setResponse\(/,"").replace(/\);?\s*$/,""));
      const map  = {};
      for (const row of (json.table.rows || [])) {
        const c = row.c || [];
        const k = String((c[0]&&c[0].v)||"").trim();
        const v = String((c[1]&&c[1].v)||"").trim();
        if (k && v) map[normalizeName(k)] = v;
      }
      return map;
    } catch { return {}; }
  }

  async function convocazioniAttive() {
    try {
      const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=setting&range=B1&tqx=out:json`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.replace(/^\/\*O_o\*\/\s*/,"").replace(/^google\.visualization\.Query\.setResponse\(/,"").replace(/\);?\s*$/,""));
      return String(json.table.rows?.[0]?.c?.[0]?.v||"").trim().toLowerCase() === "on";
    } catch { return true; }
  }

  async function caricaLink() {
    try {
      const [res, trophyMap] = await Promise.all([
        fetch(WORKER_URL, { headers: { referer: REFERER } }),
        leggiTrophyMap()
      ]);
      if (!res.ok) throw new Error();
      const data      = await res.json();
      const container = document.getElementById("linkContainer");

      for (const item of data) {
        const div = document.createElement("div");
        div.className = "button";
        div.dataset.nomeClan = normalizeName(item.nome);
        div.addEventListener("click", () => cliccaClan(item.id));

        const img = document.createElement("img");
        img.className = "clan-logo"; img.src = item.img; img.alt = item.nome;

        const span = document.createElement("span");
        span.className = "button-label"; span.textContent = item.nome;

        const trophyBox = document.createElement("div");
        trophyBox.className = "trophy-box";
        const ti = document.createElement("img");
        ti.className = "trophy-icon"; ti.src = TROPHY_ICON; ti.alt = "Coppe";
        const tv = document.createElement("span");
        tv.className = "trophy-value"; tv.textContent = trophyMap[normalizeName(item.nome)] || "-";
        trophyBox.append(ti, tv);

        div.append(img, span, trophyBox);
        container.appendChild(div);
      }
    } catch {
      document.getElementById("dynamicTop").innerHTML = `
        <div class="offline-box">
          <div class="offline-title">La war è iniziata ⚔️</div>
          <div class="offline-text">I link non sono più disponibili</div>
        </div>`;
    }
  }

  async function cliccaClan(id) {
    try {
      const tokenRes  = await fetch(`${WORKER_URL}?id=${id}`, { headers: { referer: REFERER } });
      if (!tokenRes.ok) throw new Error();
      const tokenData = await tokenRes.json();
      if (!tokenData.token) { alert("Token non ricevuto"); return; }
      if (tokenData.empty) { document.getElementById("noLinkOverlay").classList.add("visible"); return; }
      window.location.href = `${WORKER_URL}?id=${id}&token=${tokenData.token}`;
    } catch { alert("Errore apertura link. Riprova."); }
  }

  async function verificaConvocazione() {
    const outputEl = document.getElementById("verificaRisultato");
    const attive   = await convocazioniAttive();
    if (!attive) {
      outputEl.innerHTML = "Le convocazioni non sono ancora disponibili";
      outputEl.className = ""; outputEl.style.display = "block"; return;
    }
    let tag = document.getElementById("verificaInput").value.trim();
    if (!tag) return;
    tag = tag.replace(/^@+/, "").toUpperCase();
    localStorage.setItem("ultimoTag", tag);
    document.querySelectorAll("#linkContainer .button.convocato").forEach(b => b.classList.remove("convocato"));
    outputEl.innerHTML = "⏳ Controllo in corso...";
    outputEl.className = ""; outputEl.style.display = "block";

    try {
      const risultati = []; const clanConvocati = new Set();
      for (const sheetName of CLAN_SHEETS) {
        const rows = await leggiFoglio(sheetName);
        for (let i = 1; i < rows.length; i++) {
          const c   = rows[i].c || [];
          const raw = c[1] != null ? c[1].v : null;
          if (!raw) continue;
          const nome    = String((c[0]&&c[0].v)||"").trim();
          const tagCell = String(raw).replace(/^@+/,"").toUpperCase().trim();
          if (tagCell === tag) {
            risultati.push(`• Sei convocato in <strong>${sheetName}</strong> con l'account ${nome}`);
            clanConvocati.add(normalizeName(sheetName));
          }
        }
      }
      document.querySelectorAll("#linkContainer .button").forEach(btn => {
        if (clanConvocati.has(btn.dataset.nomeClan)) btn.classList.add("convocato");
      });
      if (risultati.length) {
        outputEl.innerHTML = risultati.join("<br>"); outputEl.className = "trovato";
      } else {
        outputEl.innerHTML = `❌ Tag "<strong>${tag}</strong>" non trovato nelle convocazioni`;
        outputEl.className = "non-trovato";
      }
    } catch {
      outputEl.innerHTML = "Errore caricamento dati"; outputEl.className = "non-trovato";
    }
    outputEl.style.display = "block";
  }

  function initApp() {
    const top  = document.getElementById("dynamicTop");
    const wrap = document.createElement("div");
    wrap.id = "verificaContainer";

    const input = document.createElement("input");
    input.id = "verificaInput"; input.type = "text";
    input.placeholder = "Inserisci il tuo tag Telegram";
    input.autocomplete = "off"; input.autocorrect = "off";
    input.autocapitalize = "characters"; input.spellcheck = false;
    const savedTag = localStorage.getItem("ultimoTag");
    if (savedTag) input.value = savedTag;
    input.addEventListener("keydown", e => { if (e.key === "Enter") verificaConvocazione(); });

    const btn = document.createElement("div");
    btn.className = "button"; btn.id = "verificaBtn";
    btn.style.justifyContent = "center";
    btn.addEventListener("click", verificaConvocazione);
    const bl = document.createElement("span");
    bl.className = "button-label"; bl.textContent = "Verifica convocazione";
    btn.appendChild(bl);

    const out = document.createElement("div");
    out.id = "verificaRisultato";

    wrap.append(input, btn, out);
    top.appendChild(wrap);
    caricaLink();

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(console.error);
  }

  document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
